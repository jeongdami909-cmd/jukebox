<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Sliding Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;400&display=swap');

        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }

        body {
            margin: 0; padding: 0; height: 100vh;
            font-family: 'Cinzel', serif;
            background: #000 center/cover no-repeat;
            background-attachment: fixed;
            background-image: url('https://images.unsplash.com/photo-1516478950587-8d076cd771ad?q=80&w=2070');
            overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }

        /* 옅은 흰색 고스트 버튼 */
        .ghost-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.5);
            padding: 4px 12px; border-radius: 20px; font-size: 8px;
            cursor: pointer; backdrop-filter: blur(5px);
            text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s;
        }
        .ghost-btn:hover { background: rgba(255, 255, 255, 0.15); color: #fff; border-color: rgba(255, 255, 255, 0.4); }

        /* 상단 네비게이션 */
        .top-nav { position: fixed; top: 30px; display: flex; gap: 8px; z-index: 2000; }

        /* [핵심] 슬라이딩 패널 (게시판) */
        .sliding-panel {
            position: fixed; bottom: 0; width: 100%; height: 90vh;
            background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(40px);
            border-top: 1px solid rgba(255, 255, 255, 0.15); border-radius: 40px 40px 0 0;
            z-index: 500; display: flex; flex-direction: column; align-items: center;
            transform: translateY(calc(100% - 70px)); transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .sliding-panel.is-open { transform: translateY(0); }

        /* 투명하지만 보이는 핸들 */
        .panel-handle { 
            width: 100%; height: 70px; cursor: pointer; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .handle-bar { width: 40px; height: 2px; background: rgba(255, 255, 255, 0.3); margin-bottom: 8px; box-shadow: 0 0 10px rgba(255,255,255,0.2); }

        /* 아카이브 게시판 영역 */
        .board-area { width: min(95vw, 550px); flex: 1; overflow-y: auto; padding: 20px 0 100px; display: flex; flex-direction: column; gap: 45px; }
        
        /* 셔터 카드 */
        .shutter-card {
            position: relative; width: 100%; height: 420px;
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; overflow: hidden;
        }

        /* [핵심] 안쪽 화면 (열렸을 때 보이는 영역) */
        .media-back { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 1; display: flex; flex-direction: column; align-items: center; 
        }
        .media-content { width: 100%; height: 75%; overflow: hidden; position: relative; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .media-content video, .media-content img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 안쪽 관리 도구 */
        .media-controls { 
            width: 100%; height: 25%; display: flex; align-items: center; justify-content: center; gap: 10px; 
            background: rgba(255,255,255,0.02);
        }

        /* [핵심] 100% 밀려나는 덮개 */
        .shutter-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(35, 35, 35, 0.95); backdrop-filter: blur(15px); z-index: 5;
            padding: 30px; display: flex; flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.15); transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .shutter-card.open .shutter-cover { transform: translateX(100%); } /* 시원하게 100% 밀기 */

        .faint-white { color: rgba(255, 255, 255, 0.4); font-size: 8px; letter-spacing: 3px; text-transform: uppercase; font-weight: bold; }
        .desc-text { color: rgba(255, 255, 255, 0.6); font-size: 11px; line-height: 1.9; font-family: 'Noto Serif KR'; outline: none; margin-top: 15px; flex: 1; overflow-y: auto; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="top-nav">
        <label class="ghost-btn">EDIT BG<input type="file" id="bgIn" accept="image/*"></label>
        <button class="ghost-btn" onclick="deleteBG()">DEL BG</button>
        <button class="ghost-btn" id="bgFixBtn" onclick="toggleBGFix()">FIX BG: ON</button>
    </div>

    <div class="sliding-panel" id="mainPanel">
        <div class="panel-handle" onclick="togglePanel()">
            <div class="handle-bar"></div>
            <span class="faint-white">PULL UP ARCHIVE</span>
        </div>

        <div class="board-area" id="boardList">
            <div class="shutter-card" id="card-1">
                <div class="media-back">
                    <div class="media-content" id="display-1" onclick="triggerUp(1, 'media')">
                        <p style="text-align:center; margin-top:120px; color:rgba(255,255,255,0.2); font-size:8px; letter-spacing:2px;">ADD VIDEO / PHOTO</p>
                    </div>
                    <div class="media-controls">
                        <button class="ghost-btn" onclick="toggleShutter(1)">CLOSE</button>
                        <button class="ghost-btn" onclick="triggerUp(1, 'media')">EDIT</button>
                        <button class="ghost-btn" onclick="alert('Fixed this slot.')">FIX</button>
                        <button class="ghost-btn" style="color:rgba(255,100,100,0.5);" onclick="this.closest('.shutter-card').remove()">DEL</button>
                    </div>
                </div>
                <div class="shutter-cover">
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px;">
                        <span class="faint-white">ARCHIVE #01</span>
                        <button class="ghost-btn" onclick="toggleShutter(1)">OPEN VIEW</button>
                    </div>
                    <div class="desc-text" contenteditable="true">
                        오른쪽 위 'OPEN VIEW'를 누르면 덮개가 완전히 밀리며 안쪽의 관리 도구와 미디어가 나타납니다.
                    </div>
                    <div style="margin-top: 15px; display:flex; gap:8px;">
                        <button class="ghost-btn" onclick="triggerUp(1, 'audio')">MUSIC</button>
                        <button class="ghost-btn" id="play-1" onclick="togglePlay(1)">PLAY</button>
                        <audio id="player-1" loop></audio>
                    </div>
                </div>
                <input type="file" id="media-in-1" accept="image/*,video/*" onchange="loadMedia(event, 1)">
                <input type="file" id="audio-in-1" accept="audio/*" onchange="loadAudio(event, 1)">
            </div>
        </div>

        <div style="width: 100%; height: 80px; display: flex; align-items: center; justify-content: center;">
            <button class="ghost-btn" style="padding: 10px 40px;" onclick="addNewCard()">+ ADD NEW ARCHIVE</button>
        </div>
    </div>

    <script>
        let cardCount = 1;
        let isBGFixed = true;

        // 배경 제어
        document.getElementById('bgIn').onchange = (e) => {
            const f = e.target.files[0];
            if(f) document.body.style.backgroundImage = `url(${URL.createObjectURL(f)})`;
        };
        function deleteBG() {
            if(confirm("Delete background?")) document.body.style.backgroundImage = "none";
        }
        function toggleBGFix() {
            isBGFixed = !isBGFixed;
            const btn = document.getElementById('bgFixBtn');
            document.body.style.backgroundAttachment = isBGFixed ? "fixed" : "scroll";
            btn.innerText = isBGFixed ? "FIX BG: ON" : "FIX BG: OFF";
        }

        // 패널 및 셔터 제어
        function togglePanel() { document.getElementById('mainPanel').classList.toggle('is-open'); }
        function toggleShutter(id) { document.getElementById(`card-${id}`).classList.toggle('open'); }

        // 무한 추가
        function addNewCard() {
            cardCount++;
            const list = document.getElementById('boardList');
            const newCard = document.createElement('div');
            newCard.className = 'shutter-card';
            newCard.id = `card-${cardCount}`;
            newCard.innerHTML = `
                <div class="media-back">
                    <div class="media-content" id="display-${cardCount}" onclick="triggerUp(${cardCount}, 'media')">
                        <p style="text-align:center; margin-top:120px; color:rgba(255,255,255,0.2); font-size:8px;">ADD MEDIA</p>
                    </div>
                    <div class="media-controls">
                        <button class="ghost-btn" onclick="toggleShutter(${cardCount})">CLOSE</button>
                        <button class="ghost-btn" onclick="triggerUp(${cardCount}, 'media')">EDIT</button>
                        <button class="ghost-btn">FIX</button>
                        <button class="ghost-btn" style="color:rgba(255,100,100,0.5);" onclick="this.closest('.shutter-card').remove()">DEL</button>
                    </div>
                </div>
                <div class="shutter-cover">
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px;">
                        <span class="faint-white">ARCHIVE #${String(cardCount).padStart(2, '0')}</span>
                        <button class="ghost-btn" onclick="toggleShutter(${cardCount})">OPEN VIEW</button>
                    </div>
                    <div class="desc-text" contenteditable="true">Write a new memory...</div>
                    <div style="margin-top: 15px; display:flex; gap:8px;">
                        <button class="ghost-btn" onclick="triggerUp(${cardCount}, 'audio')">MUSIC</button>
                        <button class="ghost-btn" id="play-${cardCount}" onclick="togglePlay(${cardCount})">PLAY</button>
                        <audio id="player-${cardCount}" loop></audio>
                    </div>
                </div>
                <input type="file" id="media-in-${cardCount}" accept="image/*,video/*" onchange="loadMedia(event, ${cardCount})">
                <input type="file" id="audio-in-${cardCount}" accept="audio/*" onchange="loadAudio(event, ${cardCount})">
            `;
            list.appendChild(newCard);
        }

        function triggerUp(id, type) { document.getElementById(`${type}-in-${id}`).click(); }
        function loadMedia(e, id) {
            const f = e.target.files[0];
            if(f) {
                const url = URL.createObjectURL(f);
                const display = document.getElementById(`display-${id}`);
                display.innerHTML = f.type.startsWith('video') ? `<video src="${url}" autoplay loop muted></video>` : `<img src="${url}">`;
            }
        }
        function loadAudio(e, id) {
            const f = e.target.files[0];
            if(f) document.getElementById(`player-${id}`).src = URL.createObjectURL(f);
        }
        function togglePlay(id) {
            const p = document.getElementById(`player-${id}`);
            const b = document.getElementById(`play-${id}`);
            if(p.paused) { p.play(); b.innerText = "PAUSE"; }
            else { p.pause(); b.innerText = "PLAY"; }
        }
    </script>
</body>
</html>
