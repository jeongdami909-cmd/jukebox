<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Custom Orgel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #1a0f0a; color: #d4af37; font-family: serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        /* 사진/영상이 돌아가는 무대 */
        .stage { perspective: 1000px; margin-bottom: 30px; }
        .visual-frame {
            width: 250px; height: 350px;
            border: 5px solid #c5a059; border-radius: 10px;
            background: #000; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
        }

        /* 파일 업로드 버튼 스타일 */
        .upload-box { background: #3e2723; border: 2px dashed #c5a059; padding: 15px; border-radius: 10px; width: 320px; text-align: center; margin-bottom: 20px; }
        input[type="file"] { display: none; }
        .file-btn { background: #c5a059; color: #1a0f0a; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; display: inline-block; }

        /* 태엽과 에너지 바 */
        .wind-up-zone { text-align: center; width: 320px; }
        .key-btn { 
            width: 80px; height: 80px; background: radial-gradient(circle, #f3d078, #b08a2e); 
            border: 4px solid #3e2723; border-radius: 50%; font-size: 35px; cursor: pointer;
            margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6); transition: 0.1s;
        }
        .key-btn:active { transform: scale(0.9) rotate(45deg); }
        .energy-bar-bg { width: 100%; height: 10px; background: #3e2723; border-radius: 5px; overflow: hidden; border: 1px solid #c5a059; }
        .energy-fill { width: 0%; height: 100%; background: #f3d078; transition: width 0.1s linear; }
    </style>
</head>
<body>

    <div class="stage">
        <div class="visual-frame" id="visualFrame">
            <p style="color: #666; font-size: 14px; text-align: center;">사진이나 영상을<br>업로드해주세요</p>
        </div>
    </div>

    <div class="upload-box">
        <label class="file-btn">
            📷 사진/영상 넣기
            <input type="file" id="mediaInput" accept="image/*,video/*">
        </label>
        <label class="file-btn">
            🎵 오르골 소리 넣기
            <input type="file" id="audioInput" accept="audio/*">
        </label>
        <p id="file-status" style="font-size: 12px; margin-top: 10px; color: #aaa;">파일을 기다리는 중...</p>
    </div>

    <div class="wind-up-zone">
        <div class="key-btn" id="windKey">🗝️</div>
        <div class="energy-bar-bg">
            <div class="energy-fill" id="energyFill"></div>
        </div>
        <p style="font-size: 11px; margin-top: 5px;">태엽을 꾹꾹 눌러 감으세요</p>
    </div>

    <audio id="audioPlayer" loop></audio>

    <script>
        const mediaInput = document.getElementById('mediaInput');
        const audioInput = document.getElementById('audioInput');
        const visualFrame = document.getElementById('visualFrame');
        const audioPlayer = document.getElementById('audioPlayer');
        const windKey = document.getElementById('windKey');
        const energyFill = document.getElementById('energyFill');
        const fileStatus = document.getElementById('file-status');

        let energy = 0;
        let isPlaying = false;
        let rotation = 0;
        let playLoop;
        let hasAudio = false;

        // 사진/영상 업로드 처리
        mediaInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const fileURL = URL.createObjectURL(file);
            visualFrame.innerHTML = ''; // 기존 텍스트 지우기
            
            if (file.type.startsWith('video/')) {
                const video = document.createElement('video');
                video.src = fileURL;
                video.style.width = '100%'; video.style.height = '100%'; video.style.objectFit = 'cover';
                video.loop = true; video.muted = true; // 소리는 오디오 파일에서 나도록 비디오는 음소거
                visualFrame.appendChild(video);
                fileStatus.innerText = "비디오가 업로드되었습니다.";
            } else {
                const img = document.createElement('img');
                img.src = fileURL;
                img.style.width = '100%'; img.style.height = '100%'; img.style.objectFit = 'cover';
                visualFrame.appendChild(img);
                fileStatus.innerText = "사진이 업로드되었습니다.";
            }
        });

        // 음악 업로드 처리
        audioInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            audioPlayer.src = URL.createObjectURL(file);
            hasAudio = true;
            fileStatus.innerText = "음악이 준비되었습니다! 태엽을 감아주세요.";
        });

        // 태엽 감기 및 재생
        windKey.addEventListener('click', () => {
            if (!hasAudio) {
                alert("먼저 '오르골 소리 넣기' 버튼을 눌러 음악 파일을 올려주세요!");
                return;
            }

            // 클릭할 때마다 에너지 25% 충전
            energy = Math.min(energy + 25, 100);
            energyFill.style.width = energy + '%';

            if (!isPlaying) startOrgel();
        });

        function startOrgel() {
            isPlaying = true;
            audioPlayer.play();
            const video = visualFrame.querySelector('video');
            if (video) video.play();

            playLoop = setInterval(() => {
                if (energy > 0) {
                    energy -= 0.2; // 에너지가 천천히 닳음
                    energyFill.style.width = energy + '%';
                    
                    rotation += 1; // 무대 회전
                    visualFrame.style.transform = `rotateY(${rotation}deg)`;
                } else {
                    // 에너지 방전 시 정지
                    energy = 0;
                    energyFill.style.width = '0%';
                    isPlaying = false;
                    audioPlayer.pause();
                    if (video) video.pause();
                    clearInterval(playLoop);
                }
            }, 30); // 부드러운 애니메이션을 위해 30ms 간격
        }
    </script>
</body>
</html>
