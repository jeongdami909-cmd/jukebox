<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Crystal Window</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;400&display=swap');

        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Cinzel', 'Noto Serif KR', serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            background-image: url('https://images.unsplash.com/photo-1516478950587-8d076cd771ad?q=80&w=2070');
            transition: background-image 0.5s ease;
        }

        /* 1. 노란색 프레임이 제거된 투명 컨테이너 */
        .crystal-container {
            position: relative; width: 520px; height: 680px;
            background: rgba(255, 255, 255, 0.01); /* 극도의 투명도 */
            backdrop-filter: blur(20px);
            border-radius: 40px;
            /* 노란 프레임 제거: border 및 border-image 삭제 */
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.05), inset 0 0 50px rgba(255,255,255,0.02);
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }

        /* 중앙 직사각형 미디어 영역 */
        .media-center {
            width: 90%; height: 55%; margin-top: 40px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 2. 상시 개방된 반투명 화장대 & 서랍 */
        .vanity-glass {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            display: flex; flex-direction: column; align-items: center;
            padding-bottom: 25px;
        }

        /* 태엽이 제거되어 즉시 보이는 서랍 */
        .drawer-content {
            width: 95%; height: 180px; /* 고정 높이로 상시 노출 */
            display: flex; gap: 15px; overflow-x: auto;
            padding-top: 20px;
        }

        /* 3. 극소형 투명 영문 버튼 */
        .glass-btn-sm {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5); padding: 5px 12px; border-radius: 15px;
            font-size: 8px; cursor: pointer; backdrop-filter: blur(5px);
            transition: all 0.3s; letter-spacing: 1.5px; text-transform: uppercase;
        }
        .glass-btn-sm:hover { background: rgba(255, 255, 255, 0.1); color: #fff; border-color: #fff; }

        /* 스냅 슬롯 */
        .snap-slot {
            min-width: 110px; height: 140px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .snap-slot:hover { border-color: rgba(255,255,255,0.3); background: rgba(255, 255, 255, 0.05); }

        .top-nav { position: fixed; top: 30px; display: flex; gap: 12px; z-index: 1000; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="top-nav">
        <label class="glass-btn-sm">UPLOAD BG<input type="file" id="bgIn" accept="image/*"></label>
        <div class="glass-btn-sm" id="fixBtn">FIX FRAME</div>
    </div>

    <div class="crystal-container" id="mainBox">
        <div class="media-center" id="mainMedia">
            <p id="guide" style="color: rgba(255, 255, 255, 0.2); font-size: 9px; text-align: center; text-transform: uppercase; letter-spacing: 2px;">Select a slot to start</p>
        </div>

        <div class="vanity-glass">
            <p style="font-size: 7px; color: rgba(255,255,255,0.4); margin: 15px 0 10px; font-weight: bold; letter-spacing: 4px; text-transform: uppercase;">Memory Archives</p>
            
            <div class="drawer-content" id="drawer">
                <script>
                    for(let i=1; i<=20; i++) {
                        document.write(`
                            <div class="snap-slot" onclick="openUploader(${i})">
                                <div id="v-pre-${i}" style="width:100%; height:90px; overflow:hidden; display:flex; align-items:center; justify-content:center; color:#333; font-size:7px; text-transform: uppercase;">Empty</div>
                                <p style="margin-top:10px; font-size:8px; font-weight:bold; color:rgba(255,255,255,0.4);">#${String(i).padStart(2, '0')}</p>
                                <input type="file" id="m-file-${i}" accept="image/*,video/*" onchange="previewMedia(event, ${i})">
                                <input type="file" id="a-file-${i}" accept="audio/*" onchange="previewAudio(event, ${i})">
                            </div>
                        `);
                    }
                </script>
            </div>
        </div>
    </div>

    <audio id="player" loop></audio>

    <script>
        let isFixed = false;
        const slots = Array(21).fill(null).map(() => ({ media: null, type: null, audio: null }));

        // 1. 배경 설정
        document.getElementById('bgIn').onchange = (e) => {
            const f = e.target.files[0];
            if(f) document.body.style.backgroundImage = `url(${URL.createObjectURL(f)})`;
        };

        // 2. 화면 고정
        document.getElementById('fixBtn').onclick = () => {
            isFixed = !isFixed;
            const box = document.getElementById('mainBox');
            if(isFixed) {
                box.style.position = 'fixed'; box.style.top = '50%'; box.style.left = '50%';
                box.style.transform = 'translate(-50%, -50%)';
                document.getElementById('fixBtn').innerText = "UNLOCK";
            } else {
                box.style.position = 'relative'; box.style.top = 'auto'; box.style.left = 'auto';
                box.style.transform = 'none';
                document.getElementById('fixBtn').innerText = "FIX FRAME";
            }
        };

        // 3. 업로드 및 연동
        function openUploader(i) {
            if(confirm(`PAGE ${i}: Image/Video?\n(Cancel for Audio)`)) {
                document.getElementById(`m-file-${i}`).click();
            } else {
                document.getElementById(`a-file-${i}`).click();
            }
        }

        function previewMedia(e, i) {
            const f = e.target.files[0];
            if(f) {
                const url = URL.createObjectURL(f);
                slots[i].media = url;
                slots[i].type = f.type.startsWith('video') ? 'video' : 'image';
                
                const pre = document.getElementById(`v-pre-${i}`);
                if(slots[i].type === 'video') {
                    pre.innerHTML = `<video src="${url}" style="width:100%; height:100%; object-fit:cover;" muted autoplay loop></video>`;
                } else {
                    pre.innerHTML = `<img src="${url}" style="width:100%; height:100%; object-fit:cover;">`;
                }
                updateMain(i);
            }
        }

        function previewAudio(e, i) {
            const f = e.target.files[0];
            if(f) {
                slots[i].audio = URL.createObjectURL(f);
                updateMain(i);
            }
        }

        function updateMain(i) {
            const main = document.getElementById('mainMedia');
            document.getElementById('guide').style.display = 'none';
            main.innerHTML = '';

            if(slots[i].media) {
                if(slots[i].type === 'video') {
                    const v = document.createElement('video');
                    v.src = slots[i].media; v.style.width='100%'; v.style.height='100%'; v.style.objectFit='cover';
                    v.muted = true; v.autoplay = true; v.loop = true;
                    main.appendChild(v);
                } else {
                    const img = document.createElement('img');
                    img.src = slots[i].media; img.style.width='100%'; img.style.height='100%'; img.style.objectFit='cover';
                    main.appendChild(img);
                }
            }
            if(slots[i].audio) {
                const p = document.getElementById('player');
                p.src = slots[i].audio;
                p.play();
            }
        }
    </script>
</body>
</html>
