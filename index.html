<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA-GOL: Crystal Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;400&display=swap');

        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Cinzel', 'Noto Serif KR', serif;
            background-size: cover; background-position: center;
            background-attachment: fixed;
            /* 기본 배경: 사용자님이 업로드하면 바뀝니다 */
            background-image: url('https://images.unsplash.com/photo-1516478950587-8d076cd771ad?q=80&w=2070');
            transition: background-image 0.5s ease;
        }

        /* 1. 투명 골드 미러 프레임 (6263.jpg 기반) */
        .mirror-container {
            position: relative; width: 500px; height: 700px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 250px 250px 40px 40px;
            /* 6263.jpg 스타일의 골드 베젤 */
            border: 12px solid transparent;
            border-image: linear-gradient(to bottom, #d4af37, #f3d078, #b08a2e) 1;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.3), inset 0 0 60px rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }

        /* 중앙 미디어 영역 (사진/영상) */
        .media-center {
            width: 85%; height: 55%; margin-top: 50px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 180px 180px 20px 20px;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        /* 2. 반투명 화이트 화장대 & 서랍 */
        .vanity-glass {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(255, 255, 255, 0.2); /* 반투명 화이트 */
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            display: flex; flex-direction: column; align-items: center;
            padding-bottom: 20px;
        }

        .drawer-content {
            width: 95%; height: 0;
            display: flex; gap: 15px; overflow-x: auto;
            transition: height 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .drawer-content.open { height: 180px; padding-top: 20px; border-top: 1px solid rgba(212, 175, 55, 0.5); }

        /* 3. 투명 버튼 스타일 */
        .glass-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #d4af37; padding: 10px 20px; border-radius: 30px;
            font-size: 12px; cursor: pointer; backdrop-filter: blur(5px);
            transition: all 0.3s;
        }
        .glass-btn:hover { background: rgba(212, 175, 55, 0.2); border-color: #d4af37; }

        /* 스냅 슬롯 */
        .snap-slot {
            min-width: 110px; height: 140px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px; transition: 0.2s;
        }
        .snap-slot:hover { border-color: #d4af37; background: rgba(255, 255, 255, 0.2); }

        /* 황금 태엽 */
        .wind-key {
            width: 70px; height: 70px; margin-top: -35px;
            background: radial-gradient(circle, #f3d078, #b08a2e);
            border: 3px solid #1a0f0a; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; cursor: pointer; z-index: 50;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .wind-key:active { transform: scale(0.9) rotate(90deg); }

        .top-menu { position: fixed; top: 30px; display: flex; gap: 15px; z-index: 100; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="top-menu">
        <label class="glass-btn">🖼️ 배경 사진 업로드<input type="file" id="bgInput" accept="image/*"></label>
        <div class="glass-btn" id="lockBtn">🔒 화면 고정</div>
    </div>

    <div class="mirror-container" id="mirrorBox">
        <h2 style="color: #d4af37; margin-top: 40px; letter-spacing: 8px; font-size: 20px;">AURA-GOL</h2>
        
        <div class="media-center" id="mediaDisplay">
            <p id="placeholderText" style="color: rgba(212, 175, 55, 0.5); font-size: 12px; text-align: center;">서랍을 열어<br>추억을 담아주세요</p>
        </div>

        <div class="vanity-glass">
            <div class="wind-key" id="windUp">🗝️</div>
            <p style="font-size: 10px; color: #3e2723; margin-top: 8px; font-weight: bold; letter-spacing: 2px;">WIND UP MEMORY</p>
            
            <div class="drawer-content" id="drawer">
                <script>
                    for(let i=1; i<=20; i++) {
                        document.write(`
                            <div class="snap-slot" onclick="handleUpload(${i})">
                                <div id="pre-${i}" style="width:100%; height:90px; overflow:hidden; display:flex; align-items:center; justify-content:center;">No Media</div>
                                <p style="margin-top:8px; font-weight:bold; color:#d4af37;">SLOT ${String(i).padStart(2, '0')}</p>
                                <input type="file" id="media-${i}" accept="image/*,video/*" onchange="loadMedia(event, ${i})">
                                <input type="file" id="audio-${i}" accept="audio/*" onchange="loadAudio(event, ${i})">
                            </div>
                        `);
                    }
                </script>
            </div>
        </div>
    </div>

    <audio id="orgelPlayer" loop></audio>

    <script>
        let energy = 0;
        let isLocked = false;
        const slots = Array(21).fill(null).map(() => ({ media: null, type: null, audio: null }));

        // 1. 배경 설정
        document.getElementById('bgInput').onchange = (e) => {
            const file = e.target.files[0];
            if(file) document.body.style.backgroundImage = `url(${URL.createObjectURL(file)})`;
        };

        // 2. 화면 고정
        document.getElementById('lockBtn').onclick = () => {
            isLocked = !isLocked;
            const box = document.getElementById('mirrorBox');
            if(isLocked) {
                box.style.position = 'fixed';
                box.style.top = '50%'; box.style.left = '50%';
                box.style.transform = 'translate(-50%, -50%)';
                document.getElementById('lockBtn').innerText = "🔓 고정 해제";
            } else {
                box.style.position = 'relative';
                box.style.top = 'auto'; box.style.left = 'auto';
                box.style.transform = 'none';
                document.getElementById('lockBtn').innerText = "🔒 화면 고정";
            }
        };

        // 3. 태엽 감기
        document.getElementById('windUp').onclick = () => {
            energy += 34;
            if(energy >= 100) {
                document.getElementById('drawer').classList.add('open');
                energy = 100;
            }
        };

        // 4. 업로드 로직
        function handleUpload(i) {
            if(confirm(`Slot ${i}에 넣을 사진/영상을 먼저 선택할까요? (취소 시 오르골 음악 선택)`)) {
                document.getElementById(`media-${i}`).click();
            } else {
                document.getElementById(`audio-${i}`).click();
            }
        }

        function loadMedia(e, i) {
            const file = e.target.files[0];
            if(file) {
                const url = URL.createObjectURL(file);
                slots[i].media = url;
                slots[i].type = file.type.startsWith('video') ? 'video' : 'image';
                
                // 프리뷰 업데이트
                const pre = document.getElementById(`pre-${i}`);
                if(slots[i].type === 'video') {
                    pre.innerHTML = `<video src="${url}" style="width:100%; height:100%; object-fit:cover;" muted autoplay loop></video>`;
                } else {
                    pre.innerHTML = `<img src="${url}" style="width:100%; height:100%; object-fit:cover;">`;
                }
                showOnMain(i);
            }
        }

        function loadAudio(e, i) {
            const file = e.target.files[0];
            if(file) {
                slots[i].audio = URL.createObjectURL(file);
                alert(`${i}번 오르골 소리가 준비되었습니다.`);
                showOnMain(i);
            }
        }

        function showOnMain(i) {
            const display = document.getElementById('mediaDisplay');
            document.getElementById('placeholderText').style.display = 'none';
            display.innerHTML = '';

            if(slots[i].media) {
                if(slots[i].type === 'video') {
                    const v = document.createElement('video');
                    v.src = slots[i].media; v.style.width='100%'; v.style.height='100%'; v.style.objectFit='cover';
                    v.muted = true; v.autoplay = true; v.loop = true;
                    display.appendChild(v);
                } else {
                    const img = document.createElement('img');
                    img.src = slots[i].media; img.style.width='100%'; img.style.height='100%'; img.style.objectFit='cover';
                    display.appendChild(img);
                }
            }
            if(slots[i].audio) {
                const p = document.getElementById('orgelPlayer');
                p.src = slots[i].audio;
                p.play();
            }
        }
    </script>
</body>
</html>
