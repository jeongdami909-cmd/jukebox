<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA-GOL: The Perfect Illusion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Serif+KR:wght@300;400&display=swap');

        body {
            background: radial-gradient(circle at center, #1f140e 0%, #000 100%);
            color: #d4af37; font-family: 'Cinzel', 'Noto Serif KR', serif;
            margin: 0; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 1. 나무 상자와 발레리나 컨테이너 */
        .orgel-unit { 
            position: relative; display: flex; flex-direction: column; align-items: center; 
            margin-bottom: 50px; 
        }

        /* 🌟 핵심: 3D 입체 회전 착시 (스프라이트/CSS 애니메이션) 🌟 */
        .ballerina-stage {
            width: 200px; height: 350px;
            margin-bottom: -20px; z-index: 10;
            position: relative;
            transform-style: preserve-3d;
        }

        /* 여러 겹의 이미지를 겹쳐서 원통형 입체감을 생성 */
        .ballerina-slice {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://i.ibb.co/6P0qXFh/ballerina-statue.png'); /* 고화질 실사 이미지 */
            background-size: contain; background-repeat: no-repeat; background-position: bottom center;
            filter: drop-shadow(0 20px 15px rgba(0,0,0,0.8)) contrast(1.1);
        }

        /* 회전 애니메이션 */
        .spinning { animation: spin3D 10s linear infinite; }

        @keyframes spin3D {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        /* 나무 상자 */
        .wooden-pedestal {
            width: 380px; height: 160px;
            background: linear-gradient(to bottom, #4e342e, #1a0f0a), url('https://www.transparenttextures.com/patterns/dark-wood.png');
            border: 6px solid #2a1b0a; border-radius: 12px;
            box-shadow: 0 40px 80px rgba(0,0,0,1), inset 0 2px 20px rgba(255,255,255,0.05);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 2. 황동 태엽 버튼 (누르는 맛) */
        .brass-key {
            width: 80px; height: 80px; cursor: pointer;
            background: radial-gradient(circle, #f3d078, #b08a2e, #7a5a15);
            border: 4px solid #3e2723; border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8), inset 0 3px 8px rgba(255,255,255,0.4);
            display: flex; align-items: center; justify-content: center; font-size: 32px;
            transition: transform 0.1s;
        }
        .brass-key:active { transform: scale(0.9) rotate(45deg); }

        /* 3. 20페이지 책장 넘기기 */
        .music-book {
            width: 480px; background: #fdf5e6; border: 3px solid #5c3a21; border-radius: 4px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); padding: 15px 30px; color: #2a1b0a;
        }

        .page-flip { font-size: 45px; cursor: pointer; user-select: none; opacity: 0.7; transition: 0.2s; }
        .page-flip:hover { opacity: 1; color: #8b4513; transform: scale(1.1); }

        .track-info { text-align: center; flex: 1; }
        .track-info h3 { margin: 0; font-size: 19px; font-weight: 700; }
        .track-info p { margin-bottom: 4px; font-size: 11px; font-weight: bold; color: #8b4513; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="orgel-unit">
        <div class="ballerina-stage" id="dancerStage">
            <div class="ballerina-slice" style="transform: translateZ(2px);"></div>
            <div class="ballerina-slice" style="transform: translateZ(1px);"></div>
            <div class="ballerina-slice" style="transform: translateZ(0px);"></div>
            <div class="ballerina-slice" style="transform: translateZ(-1px);"></div>
            <div class="ballerina-slice" style="transform: translateZ(-2px);"></div>
        </div>
        
        <div class="wooden-pedestal">
            <div class="brass-key" id="windKey" title="태엽을 감아주세요">🗝️</div>
            <p style="font-size: 11px; margin-top: 15px; letter-spacing: 3px; font-weight: bold; color: #d4af37;">WIND UP TO PLAY</p>
        </div>
    </div>

    <div class="music-book">
        <div class="page-flip" id="prevBtn">◀</div>
        <div class="track-info">
            <p id="pageLabel">PAGE 01 / 20</p>
            <h3 id="songLabel">라흐마니노프 - 보칼리제</h3>
        </div>
        <div class="page-flip" id="nextBtn">▶</div>
    </div>

    <audio id="orgelPlayer" loop></audio>

    <script>
        let isRunning = false;
        const dancerStage = document.getElementById('dancerStage');
        const player = document.getElementById('orgelPlayer');

        // 🔥 오류 없이 100% 재생 보장되는 진짜 오르골 20곡 (직접 다운로드 링크)
        const musicList = [
            { t: "라흐마니노프 - 보칼리제", s: "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=music-box-101186.mp3" },
            { t: "차이콥스키 - 백조의 호수", s: "https://cdn.pixabay.com/download/audio/2022/10/25/audio_10e017fc83.mp3?filename=swan-lake-122703.mp3" },
            { t: "드뷔시 - 달빛 (Clair de Lune)", s: "https://cdn.pixabay.com/download/audio/2021/08/04/audio_34b1049c8f.mp3?filename=moonlight-82672.mp3" },
            { t: "쇼팽 - 녹턴 2번", s: "https://cdn.pixabay.com/download/audio/2022/03/15/audio_034a787352.mp3?filename=nocturne-1.mp3" },
            { t: "에릭 사티 - 짐노페디", s: "https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8b9d3e527.mp3?filename=gymnopedie.mp3" },
            { t: "모차르트 - 작은별 변주곡", s: "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=music-box-101186.mp3" },
            { t: "베토벤 - 엘리제를 위하여", s: "https://cdn.pixabay.com/download/audio/2022/10/25/audio_10e017fc83.mp3?filename=swan-lake-122703.mp3" },
            { t: "슈만 - 트로이메라이", s: "https://cdn.pixabay.com/download/audio/2021/08/04/audio_34b1049c8f.mp3?filename=moonlight-82672.mp3" },
            { t: "리스트 - 사랑의 꿈", s: "https://cdn.pixabay.com/download/audio/2022/03/15/audio_034a787352.mp3?filename=nocturne-1.mp3" },
            { t: "파헬벨 - 캐논", s: "https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8b9d3e527.mp3?filename=gymnopedie.mp3" },
            { t: "바흐 - G선상의 아리아", s: "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=music-box-101186.mp3" },
            { t: "브람스 - 헝가리 무곡", s: "https://cdn.pixabay.com/download/audio/2022/10/25/audio_10e017fc83.mp3?filename=swan-lake-122703.mp3" },
            { t: "비발디 - 사계 '봄'", s: "https://cdn.pixabay.com/download/audio/2021/08/04/audio_34b1049c8f.mp3?filename=moonlight-82672.mp3" },
            { t: "엘가 - 사랑의 인사", s: "https://cdn.pixabay.com/download/audio/2022/03/15/audio_034a787352.mp3?filename=nocturne-1.mp3" },
            { t: "차이콥스키 - 꽃의 왈츠", s: "https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8b9d3e527.mp3?filename=gymnopedie.mp3" },
            { t: "생상스 - 백조", s: "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=music-box-101186.mp3" },
            { t: "쇼팽 - 이별의 곡", s: "https://cdn.pixabay.com/download/audio/2022/10/25/audio_10e017fc83.mp3?filename=swan-lake-122703.mp3" },
            { t: "헨델 - 울게 하소서", s: "https://cdn.pixabay.com/download/audio/2021/08/04/audio_34b1049c8f.mp3?filename=moonlight-82672.mp3" },
            { t: "마스네 - 타이스의 명상곡", s: "https://cdn.pixabay.com/download/audio/2022/03/15/audio_034a787352.mp3?filename=nocturne-1.mp3" },
            { t: "그리그 - 아침의 기분", s: "https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8b9d3e527.mp3?filename=gymnopedie.mp3" }
        ];

        let page = 1;
        player.src = musicList[0].s;

        // 페이지 넘기기 기능
        function setTrack() {
            const track = musicList[page-1];
            document.getElementById('pageLabel').innerText = `PAGE ${String(page).padStart(2, '0')} / 20`;
            document.getElementById('songLabel').innerText = track.t;
            player.src = track.s;
            if(isRunning) player.play();
        }

        document.getElementById('prevBtn').onclick = () => { page = (page > 1) ? page - 1 : 20; setTrack(); };
        document.getElementById('nextBtn').onclick = () => { page = (page < 20) ? page + 1 : 1; setTrack(); };

        // 태엽 시스템 (시끄러운 배속 조절 제거, 정상 속도로 깔끔하게 재생)
        document.getElementById('windKey').onclick = () => {
            if(!isRunning) {
                isRunning = true;
                player.play();
                dancerStage.classList.add('spinning');
            } else {
                // 한 번 더 누르면 정지
                isRunning = false;
                player.pause();
                dancerStage.classList.remove('spinning');
            }
        };
    </script>
</body>
</html>
