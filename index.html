<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Crystal: Master Background</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;400&display=swap');

        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        body {
            margin: 0; padding: 0; height: 100vh;
            font-family: 'Cinzel', serif;
            background: #000 fixed center/cover no-repeat;
            /* 초기 배경은 검은색입니다 */
            overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }

        /* 옅은 흰색 고스트 버튼 (배경 제어용) */
        .ghost-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.35);
            padding: 4px 10px; border-radius: 12px; font-size: 7px;
            cursor: pointer; backdrop-filter: blur(10px);
            text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s;
        }
        .ghost-btn:hover { background: rgba(255, 255, 255, 0.07); color: rgba(255, 255, 255, 0.8); border-color: rgba(255, 255, 255, 0.2); }

        /* 상단 통합 컨트롤 바 */
        .top-nav { position: fixed; top: 25px; display: flex; gap: 10px; z-index: 2000; }

        /* 슬라이딩 패널 (발밑 숨김) */
        .sliding-panel {
            position: fixed; bottom: 0; width: 100%; height: 90vh;
            background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(40px);
            border-top: 1px solid rgba(255, 255, 255, 0.05); border-radius: 40px 40px 0 0;
            z-index: 500; display: flex; flex-direction: column; align-items: center;
            transform: translateY(calc(100% - 65px)); transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .sliding-panel.is-open { transform: translateY(0); }
        .sliding-panel.fixed-pos { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); height: 85vh; width: min(95vw, 550px); border-radius: 30px; }

        /* 투명 핸들 */
        .panel-handle { width: 100%; height: 65px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .handle-bar { width: 30px; height: 1px; background: rgba(255, 255, 255, 0.15); margin-bottom: 5px; }

        /* 게시판 영역 */
        .board-area { width: 90%; flex: 1; overflow-y: auto; padding: 20px 0 100px; display: flex; flex-direction: column; gap: 30px; }
        
        /* 셔터 카드 */
        .shutter-card {
            position: relative; width: 100%; height: 350px;
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 15px; overflow: hidden;
        }

        /* 셔터 덮개 (옅은 회색 투명) */
        .shutter-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(30, 30, 30, 0.94); backdrop-filter: blur(15px); z-index: 5;
            padding: 25px; display: flex; flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.05); transition: transform 0.8s ease;
        }
        .shutter-card.open .shutter-cover { transform: translateX(96%); }

        .faint-white { color: rgba(255, 255, 255, 0.3); font-size: 7px; letter-spacing: 2px; text-transform: uppercase; }
        .desc-text { color: rgba(255, 255, 255, 0.5); font-size: 11px; line-height: 1.8; font-family: 'Noto Serif KR'; outline: none; margin-top: 10px; flex: 1; overflow-y: auto; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="top-nav">
        <label class="ghost-btn">EDIT BG<input type="file" id="bgIn" accept="image/*"></label>
        <button class="ghost-btn" onclick="deleteBG()">DEL BG</button>
        <button class="ghost-btn" id="fixBtn" onclick="toggleFix()">FIX FRAME</button>
    </div>

    <div class="sliding-panel" id="mainPanel">
        <div class="panel-handle" onclick="togglePanel()">
            <div class="handle-bar"></div>
            <span class="faint-white">ARCHIVE</span>
        </div>

        <div class="board-area" id="boardList">
            <div class="shutter-card" id="card-1">
                <div style="position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.05); font-size: 8px;">EMPTY SLOT</div>
                <div class="shutter-cover">
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;">
                        <span style="font-size: 8px; color: rgba(255,255,255,0.25);">#01 ARCHIVE</span>
                        <div style="display: flex; gap: 4px;">
                            <button class="ghost-btn" onclick="toggleShutter(1)">OPEN</button>
                            <button class="ghost-btn">EDIT</button>
                            <button class="ghost-btn" style="color: rgba(255, 50, 50, 0.3);">DEL</button>
                        </div>
                    </div>
                    <div class="desc-text" contenteditable="true">Write your insight here...</div>
                </div>
            </div>
        </div>

        <div style="height: 60px; display: flex; align-items: center;">
            <button class="ghost-btn" onclick="addNewCard()">+ NEW MEMORY</button>
        </div>
    </div>

    <script>
        let isFixed = false;
        let cardCount = 1;

        // [배경 수정: EDIT BG]
        document.getElementById('bgIn').onchange = (e) => {
            const f = e.target.files[0];
            if(f) document.body.style.backgroundImage = `url(${URL.createObjectURL(f)})`;
        };

        // [배경 삭제: DEL BG]
        function deleteBG() {
            if(confirm("배경사진을 삭제하고 초기화할까요?")) {
                document.body.style.backgroundImage = "none";
                document.body.style.backgroundColor = "#000";
            }
        }

        // [프레임 고정: FIX FRAME]
        function toggleFix() {
            isFixed = !isFixed;
            const panel = document.getElementById('mainPanel');
            const fixBtn = document.getElementById('fixBtn');
            
            if(isFixed) {
                panel.classList.add('fixed-pos');
                panel.classList.add('is-open');
                fixBtn.innerText = "UNFIX FRAME";
                fixBtn.style.color = "rgba(255, 255, 255, 0.8)";
            } else {
                panel.classList.remove('fixed-pos');
                panel.classList.remove('is-open');
                fixBtn.innerText = "FIX FRAME";
                fixBtn.style.color = "rgba(255, 255, 255, 0.35)";
            }
        }

        function togglePanel() { if(!isFixed) document.getElementById('mainPanel').classList.toggle('is-open'); }
        function toggleShutter(id) { document.getElementById(`card-${id}`).classList.toggle('open'); }

        function addNewCard() {
            cardCount++;
            const list = document.getElementById('boardList');
            const newCard = document.createElement('div');
            newCard.className = 'shutter-card';
            newCard.id = `card-${cardCount}`;
            newCard.innerHTML = `
                <div style="position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.05); font-size: 8px;">EMPTY SLOT</div>
                <div class="shutter-cover">
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;">
                        <span style="font-size: 8px; color: rgba(255,255,255,0.25);">#${String(cardCount).padStart(2, '0')} ARCHIVE</span>
                        <div style="display: flex; gap: 4px;">
                            <button class="ghost-btn" onclick="toggleShutter(${cardCount})">OPEN</button>
                            <button class="ghost-btn">EDIT</button>
                            <button class="ghost-btn" style="color: rgba(255, 50, 50, 0.3);">DEL</button>
                        </div>
                    </div>
                    <div class="desc-text" contenteditable="true">Record a new memory...</div>
                </div>
            `;
            list.appendChild(newCard);
        }
    </script>
</body>
</html>
