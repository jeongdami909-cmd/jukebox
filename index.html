<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA-GOL: Antique Masterpiece</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;400&display=swap');

        body {
            background: radial-gradient(circle at center, #2c1a12 0%, #000000 100%);
            color: #d4af37;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 오르골 본체 */
        .orgel-body {
            position: relative;
            width: 450px;
            background: url('https://www.transparenttextures.com/patterns/dark-wood.png'), #3e2723;
            border: 6px solid #2a1b0a;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 0 50px rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 40px;
            z-index: 10;
        }

        /* 실사 발레리나 무대 */
        .ballerina-stage {
            width: 280px;
            height: 280px;
            margin: 0 auto 40px;
            border-radius: 50%;
            border: 10px solid #c5a059;
            background: #111;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.3);
        }

        #sculpture {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: sepia(0.3) contrast(1.1);
            transition: transform 0.1s linear;
        }

        /* 태엽 (Wind-up Key) 애니메이션 */
        .wind-up-key {
            width: 100px;
            height: 100px;
            background: url('https://www.transparenttextures.com/patterns/brushed-alum.png'), #c5a059;
            mask: url('https://upload.wikimedia.org/wikipedia/commons/4/4e/Simple_silver_key.svg') no-repeat center;
            -webkit-mask: url('https://upload.wikimedia.org/wikipedia/commons/4/4e/Simple_silver_key.svg') no-repeat center;
            cursor: pointer;
            transition: transform 0.3s;
            margin: 0 auto;
        }

        .wind-up-key:active { transform: rotate(90deg) scale(0.9); }

        /* 에너지 바 (태엽 감긴 정도) */
        .energy-bar {
            width: 100%;
            height: 4px;
            background: #1a1005;
            margin-top: 20px;
            border-radius: 2px;
            overflow: hidden;
        }
        #energy-fill { width: 0%; height: 100%; background: #d4af37; transition: width 0.3s; }

        /* 책 페이지 UI */
        .book-container {
            position: absolute;
            bottom: 50px;
            width: 500px;
            height: 100px;
            background: #f4e4bc;
            border: 2px solid #8b4513;
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: #2a1b0a;
            z-index: 20;
        }

        .page-btn {
            font-size: 2rem;
            cursor: pointer;
            user-select: none;
            transition: 0.2s;
        }
        .page-btn:hover { color: #8b4513; }

        .page-info { text-align: center; }
        .page-info h3 { font-size: 1.2rem; margin: 0; }
        .page-info p { font-size: 0.8rem; font-family: 'Noto Serif KR'; margin: 0; }
    </style>
</head>
<body>

    <div class="orgel-body">
        <div class="ballerina-stage">
            <img id="sculpture" src="https://images.unsplash.com/photo-1508700929628-666bc8bd84ea?q=80&w=800&auto=format&fit=crop" alt="Real Ballerina">
        </div>

        <div class="text-center">
            <p class="text-[10px] uppercase tracking-widest mb-2">Wind up the spring</p>
            <div class="wind-up-key" id="key"></div>
            <div class="energy-bar">
                <div id="energy-fill"></div>
            </div>
        </div>
    </div>

    <div class="book-container">
        <div class="page-btn" onclick="changePage(-1)">⇠</div>
        <div class="page-info">
            <p>Story of Melody</p>
            <h3 id="track-name">PAGE 01: The First Waltz</h3>
        </div>
        <div class="page-btn" onclick="changePage(1)">⇢</div>
    </div>

    <audio id="audio" loop></audio>

    <script>
        let energy = 0;
        let rotation = 0;
        let currentPage = 1;
        let isPlaying = false;

        const key = document.getElementById('key');
        const energyFill = document.getElementById('energy-fill');
        const sculpture = document.getElementById('sculpture');
        const trackName = document.getElementById('track-name');
        const audio = document.getElementById('audio');

        // 실제 오르골 음원 (3개 반복)
        const playlist = [
            "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3",
            "https://cdn.pixabay.com/download/audio/2022/10/25/audio_10e017fc83.mp3",
            "https://cdn.pixabay.com/download/audio/2021/08/04/audio_34b1049c8f.mp3"
        ];

        // 초기 곡 설정
        audio.src = playlist[0];

        // 태엽 감기 (클릭할 때마다 에너지 15% 상승)
        key.addEventListener('click', () => {
            energy = Math.min(energy + 15, 100);
            updateUI();
            if(!isPlaying) playOrgel();
        });

        function playOrgel() {
            isPlaying = true;
            audio.play();
            
            const loop = setInterval(() => {
                if(energy > 0) {
                    energy -= 0.1; // 에너지가 천천히 감소
                    rotation += (energy / 20); // 에너지량에 따라 회전 속도 결정
                    sculpture.style.transform = `rotateY(${rotation}deg)`;
                    updateUI();
                    audio.playbackRate = Math.max(0.5, energy / 50); // 에너지가 적으면 음악이 느려짐
                } else {
                    energy = 0;
                    isPlaying = false;
                    audio.pause();
                    clearInterval(loop);
                }
            }, 50);
        }

        function updateUI() {
            energyFill.style.width = energy + "%";
        }

        // 책 페이지 넘기기
        function changePage(dir) {
            currentPage += dir;
            if(currentPage < 1) currentPage = 20;
            if(currentPage > 20) currentPage = 1;
            
            trackName.innerText = `PAGE ${String(currentPage).padStart(2, '0')}: ${getTrackTitle(currentPage)}`;
            
            // 곡 변경
            audio.src = playlist[(currentPage - 1) % 3];
            if(energy > 0) audio.play();
        }

        function getTrackTitle(page) {
            const titles = ["First Waltz", "Winter Memory", "Secret Garden", "Moonlight", "Antique Love"];
            return titles[(page-1) % titles.length];
        }
    </script>
</body>
</html>
