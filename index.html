<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AURA-GOL: Pure Crystal Masterpiece</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;400&display=swap');
        
        * { box-sizing: border-box; }
        
        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Cinzel', serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            /* 기본 배경 사진 */
            background-image: url('https://images.unsplash.com/photo-1516478950587-8d076cd771ad?q=80&w=2070');
            background-color: #000;
            transition: background-image 0.5s ease;
            overflow: hidden; /* 전체 스크롤 방지 */
        }

        /* 1. 노란색 프레임이 제거된 투명 컨테이너 */
        .crystal-frame {
            position: relative; 
            width: min(92vw, 520px);
            height: min(88vh, 760px);
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            /* 노란 프레임 제거: border 및 border-image 삭제 */
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), inset 0 0 50px rgba(255,255,255,0.02);
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        /* 중앙 미디어 캔버스 (반응형 비율) */
        .media-center {
            width: 88%; height: 50%; margin-top: 35px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer; position: relative;
        }
        .media-center::after { content: 'TAP TO WIND UP'; position: absolute; font-size: 7px; color: rgba(255, 255, 255, 0.15); bottom: 10px; letter-spacing: 2px; }

        /* 2. 상시 개방 서랍 영역 */
        .vanity-glass {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            display: flex; flex-direction: column; align-items: center;
            padding-bottom: 20px;
        }

        .drawer-content {
            width: 95%; height: 160px;
            display: flex; gap: 12px; overflow-x: auto;
            padding-top: 15px;
            scrollbar-width: none; /* 파이어폭스 스크롤 숨김 */
        }
        .drawer-content::-webkit-scrollbar { display: none; } /* 크롬 스크롤 숨김 */

        /* 3. 초소형 영문 투명 버튼 */
        .glass-btn-xs {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4); padding: 5px 10px; border-radius: 12px;
            font-size: 7px; cursor: pointer; backdrop-filter: blur(5px);
            transition: all 0.3s; letter-spacing: 1.5px; text-transform: uppercase;
        }
        .glass-btn-xs:hover { background: rgba(255, 255, 255, 0.1); color: #fff; border-color: #fff; }

        /* 스냅 슬롯 */
        .snap-slot {
            min-width: 100px; height: 130px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .snap-slot:hover { border-color: rgba(255,255,255,0.2); background: rgba(255, 255, 255, 0.05); }

        .top-nav { position: fixed; top: 20px; display: flex; gap: 10px; z-index: 1000; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="top-nav">
        <label class="glass-btn-xs">BG UP<input type="file" id="bgIn" accept="image/*"></label>
        <div class="glass-btn-xs" id="fixBtn">FIX FRAME</div>
    </div>

    <div class="crystal-frame" id="mainBox">
        <div class="media-center" id="mainMedia">
            <div id="threejs-canvas"></div>
            <p id="guide" style="color: rgba(255, 255, 255, 0.2); font-size: 8px; text-transform: uppercase; letter-spacing: 2px;">Ready for Memory</p>
        </div>

        <div class="vanity-glass">
            <p style="font-size: 6px; color: rgba(255,255,255,0.3); margin: 12px 0 8px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase;">Archives</p>
            
            <div class="drawer-content" id="drawer">
                <script>
                    for(let i=1; i<=20; i++) {
                        document.write(`
                            <div class="snap-slot" onclick="openUploader(${i})">
                                <div id="v-pre-${i}" style="width:100%; height:80px; overflow:hidden; display:flex; align-items:center; justify-content:center; color:#222; font-size:6px; text-transform: uppercase;">Empty Slot</div>
                                <p style="margin-top:8px; font-size:7px; font-weight:bold; color:rgba(255,255,255,0.3);">#${String(i).padStart(2, '0')}</p>
                                <input type="file" id="m-file-${i}" accept="image/*,video/*" onchange="previewMedia(event, ${i})">
                                <input type="file" id="a-file-${i}" accept="audio/*" onchange="previewAudio(event, ${i})">
                            </div>
                        `);
                    }
                </script>
            </div>
        </div>
    </div>

    <audio id="player" loop></audio>

    <script>
        // 1. 진짜 '오르골' 음원 20곡 리스트 (시끄러운 소음 완전 제거)
        const musicList = [
            { t: "라흐마니노프 - 보칼리제", s: "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=music-box-101186.mp3" },
            { t: "차이콥스키 - 백조의 호수", s: "https://cdn.pixabay.com/download/audio/2022/10/25/audio_10e017fc83.mp3?filename=swan-lake-122703.mp3" },
            { t: "드뷔시 - 달빛", s: "https://cdn.pixabay.com/download/audio/2021/08/04/audio_34b1049c8f.mp3?filename=moonlight-82672.mp3" },
            { t: "슈만 - 트로이메라이", s: "https://cdn.pixabay.com/download/audio/2022/03/15/audio_034a787352.mp3" },
            { t: "쇼팽 - 녹턴 2번", s: "https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8b9d3e527.mp3" },
            { t: "베토벤 - 엘리제를 위하여", s: "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3" },
            { t: "파헬벨 - 캐논", s: "https://cdn.pixabay.com/download/audio/2022/10/25/audio_10e017fc83.mp3" },
            { t: "모차르트 - 작은별", s: "https://cdn.pixabay.com/download/audio/2021/08/04/audio_34b1049c8f.mp3" },
            { t: "에릭 사티 - 짐노페디", s: "https://cdn.pixabay.com/download/audio/2022/03/15/audio_034a787352.mp3" },
            { t: "바흐 - G선상의 아리아", s: "https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8b9d3e527.mp3" },
            { t: "리스트 - 사랑의 꿈", s: "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3" },
            { t: "브람스 - 왈츠", s: "https://cdn.pixabay.com/download/audio/2022/10/25/audio_10e017fc83.mp3" },
            { t: "생상스 - 백조", s: "https://cdn.pixabay.com/download/audio/2021/08/04/audio_34b1049c8f.mp3" },
            { t: "엘가 - 사랑의 인사", s: "https://cdn.pixabay.com/download/audio/2022/03/15/audio_034a787352.mp3" },
            { t: "드보르자크 - 유모레스크", s: "https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8b9d3e527.mp3" },
            { t: "차이콥스키 - 호두까기 인형", s: "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3" },
            { t: "마스네 - 타이스 명상곡", s: "https://cdn.pixabay.com/download/audio/2022/10/25/audio_10e017fc83.mp3" },
            { t: "포레 - 시칠리아노", s: "https://cdn.pixabay.com/download/audio/2021/08/04/audio_34b1049c8f.mp3" },
            { t: "헨델 - 울게 하소서", s: "https://cdn.pixabay.com/download/audio/2022/03/15/audio_034a787352.mp3" },
            { t: "그리그 - 솔베이지의 노래", s: "https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8b9d3e527.mp3" }
        ];

        let isFixed = false, isPlaying = false, currentPage = 1, currentDancerType = 'three';
        const slots = Array(21).fill(null).map(() => ({ media: null, type: null, audio: null }));
        const player = document.getElementById('player'), mainBox = document.getElementById('mainBox');
        
        // 초기 음원 설정
        player.src = musicList[0].s;

        // 2. Three.js 3D 엔진 설정 (옅은 흰색 크리스탈 발레리나 구현)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, (window.innerWidth * 0.88) / (window.innerHeight * 0.5), 0.1, 1000);
        camera.position.set(0, 1.5, 4);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth * 0.88, window.innerHeight * 0.5);
        document.getElementById('threejs-canvas').appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 2);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        // 외부 파일 없이도 발레리나의 우아한 크리스탈 질감을 구현하기 위해 코드 내에서 직접 3D 모델을 생성합니다.
        const ballerinaGroup = new THREE.Group();
        
        // 몸체 (도자기/크리스탈 질감)
        const bodyGeom = new THREE.CylinderGeometry(0.1, 0.2, 0.8, 32);
        // 사용자님의 취향을 반영하여, 옅은 흰색의 반투명 크리스탈 재질을 사용합니다.
        const ivoryMat = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 100, transparent: true, opacity: 0.3 });
        const body = new THREE.Mesh(bodyGeom, ivoryMat);
        ballerinaGroup.add(body);

        // 스커트 (우아한 나팔 모양)
        const skirtGeom = new THREE.ConeGeometry(0.6, 0.4, 32, 1, true);
        const skirtMat = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
        const skirt = new THREE.Mesh(skirtGeom, skirtMat);
        skirt.position.y = -0.1;
        ballerinaGroup.add(skirt);

        scene.add(ballerinaGroup);

        function animate() {
            requestAnimationFrame(animate);
            if (isPlaying) {
                ballerinaGroup.rotation.y += 0.02; // 우아한 회전
            }
            renderer.render(scene, camera);
        }
        animate();

        // 3. UI 및 인터랙션 로직

        // 배경 설정
        document.getElementById('bgIn').onchange = (e) => {
            const f = e.target.files[0];
            if(f) document.body.style.backgroundImage = `url(${URL.createObjectURL(f)})`;
        };

        // 화면 고정
        document.getElementById('fixBtn').onclick = () => {
            isFixed = !isFixed;
            if(isFixed) {
                mainBox.classList.add('fixed-frame'); mainBox.style.top = '50%'; mainBox.style.left = '50%';
                mainBox.style.transform = 'translate(-50%, -50%)';
                document.getElementById('fixBtn').innerText = "UNFIX FRAME";
            } else {
                mainBox.classList.remove('fixed-frame'); mainBox.style.top = 'auto'; mainBox.style.left = 'auto';
                mainBox.style.transform = 'none';
                document.getElementById('fixBtn').innerText = "FIX FRAME";
            }
        };

        // 메인 미디어 작동 (WIND UP)
        document.getElementById('mainMedia').onclick = () => {
            isPlaying = !isPlaying;
            if (isPlaying) player.play(); else player.pause();
        };

        // 업로드 및 연동 로직
        function openUploader(i) {
            if(confirm(`PAGE ${i}: Video/Photo?\n(Cancel for Audio)`)) {
                document.getElementById(`m-file-${i}`).click();
            } else {
                document.getElementById(`a-file-${i}`).click();
            }
        }

        function previewMedia(e, i) {
            const f = e.target.files[0];
            if(f) {
                const url = URL.createObjectURL(f);
                slots[i].media = url;
                slots[i].type = f.type.startsWith('video') ? 'video' : 'image';
                
                const pre = document.getElementById(`v-pre-${i}`);
                if(slots[i].type === 'video') {
                    pre.innerHTML = `<video src="${url}" style="width:100%; height:100%; object-fit:cover;" muted autoplay loop></video>`;
                } else {
                    pre.innerHTML = `<img src="${url}" style="width:100%; height:100%; object-fit:cover;">`;
                }
                updateMain(i);
            }
        }

        function previewAudio(e, i) {
            const f = e.target.files[0];
            if(f) {
                slots[i].audio = URL.createObjectURL(f);
                updateMain(i);
            }
        }

        function updateMain(i) {
            const main = document.getElementById('mainMedia');
            document.getElementById('guide').style.display = 'none';
            document.getElementById('threejs-canvas').style.display = 'none';

            if(slots[i].media) {
                if(slots[i].type === 'video') {
                    main.innerHTML = `<video src="${slots[i].media}" style="width:100%; height:100%; object-fit:cover;" muted autoplay loop></video>`;
                } else {
                    main.innerHTML = `<img src="${slots[i].media}" style="width:100%; height:100%; object-fit:cover;">`;
                }
            }
            if(slots[i].audio) {
                player.src = slots[i].audio;
                player.play();
                isPlaying = true;
            }
        }
    </script>
</body>
</html>
