<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Scroll Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;400&display=swap');

        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Cinzel', 'Noto Serif KR', serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            background-image: url('https://images.unsplash.com/photo-1516478950587-8d076cd771ad?q=80&w=2070');
            background-color: #000;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; /* 가로 스크롤 방지 */
        }

        /* 상단 고정 메뉴 */
        .top-nav { position: fixed; top: 20px; right: 20px; display: flex; gap: 8px; z-index: 1000; }
        .mini-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5); padding: 5px 10px; border-radius: 12px;
            font-size: 7px; cursor: pointer; backdrop-filter: blur(10px);
            letter-spacing: 1px; text-transform: uppercase;
        }

        /* 1. 가운데 사각 비디오 존 */
        .video-container {
            margin-top: 80px; width: min(90vw, 500px); height: 300px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; cursor: pointer; position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .video-container:hover { background: rgba(255, 255, 255, 0.05); }
        .video-container video, .video-container img { width: 100%; height: 100%; object-fit: cover; }
        .upload-hint { position: absolute; font-size: 8px; color: rgba(255,255,255,0.2); letter-spacing: 2px; }

        /* 2. 하단 스크롤 게시판 (발밑까지) */
        .board-section {
            width: min(90vw, 500px); flex: 1;
            margin-top: 30px; margin-bottom: 50px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .post-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            transition: transform 0.3s ease;
        }

        .post-media {
            width: 100%; height: 200px; background: rgba(0,0,0,0.1);
            border-radius: 10px; overflow: hidden; display: flex; 
            align-items: center; justify-content: center; cursor: pointer;
        }

        .post-text {
            color: rgba(255, 255, 255, 0.7); font-size: 11px;
            line-height: 1.8; font-family: 'Noto Serif KR';
            word-break: break-all;
        }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="top-nav">
        <label class="mini-btn">SET BG<input type="file" id="bgIn" accept="image/*"></label>
    </div>

    <div class="video-container" id="mainVideoZone" onclick="document.getElementById('mainFile').click()">
        <p class="upload-hint" id="mainHint">CLICK TO UPLOAD VIDEO</p>
        <input type="file" id="mainFile" accept="video/*,image/*">
    </div>

    <div class="board-section" id="board">
        <script>
            for(let i=1; i<=20; i++) {
                document.write(`
                    <div class="post-card">
                        <div class="post-media" onclick="uploadPostMedia(${i})">
                            <div id="media-pre-${i}" style="font-size:7px; color:rgba(255,255,255,0.2);">TAP TO ADD MEDIA</div>
                            <input type="file" id="post-file-${i}" accept="image/*,video/*" onchange="loadPostMedia(event, ${i})">
                        </div>
                        <div class="post-text" contenteditable="true" placeholder="이곳에 글을 입력하세요...">
                            #${String(i).padStart(2, '0')} Memory Archive. 사용자님의 소중한 기록을 이곳에 적어주세요. 이 칸은 글이 길어지면 아래로 계속 늘어납니다. 오르골 소리와 함께 감상하는 당신만의 통찰을 기록하세요.
                        </div>
                    </div>
                `);
            }
        </script>
    </div>

    <audio id="bgAudio" loop></audio>

    <script>
        // 1. 배경 설정
        document.getElementById('bgIn').onchange = (e) => {
            const f = e.target.files[0];
            if(f) document.body.style.backgroundImage = `url(${URL.createObjectURL(f)})`;
        };

        // 2. 메인 비디오 존 업로드
        document.getElementById('mainFile').onchange = (e) => {
            const f = e.target.files[0];
            if(f) {
                const url = URL.createObjectURL(f);
                const zone = document.getElementById('mainVideoZone');
                document.getElementById('mainHint').style.display = 'none';
                
                if(f.type.startsWith('video')) {
                    zone.innerHTML = `<video src="${url}" autoplay loop muted></video>`;
                } else {
                    zone.innerHTML = `<img src="${url}">`;
                }
            }
        };

        // 3. 게시판 미디어 업로드
        function uploadPostMedia(i) {
            document.getElementById(`post-file-${i}`).click();
        }

        function loadPostMedia(e, i) {
            const f = e.target.files[0];
            if(f) {
                const url = URL.createObjectURL(f);
                const pre = document.getElementById(`media-pre-${i}`);
                if(f.type.startsWith('video')) {
                    pre.innerHTML = `<video src="${url}" autoplay loop muted style="width:100%; height:100%; object-fit:cover;"></video>`;
                } else {
                    pre.innerHTML = `<img src="${url}" style="width:100%; height:100%; object-fit:cover;">`;
                }
            }
        }
    </script>
</body>
</html>
