<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA-GOL: Final Masterpiece</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Serif+KR:wght@300;400&display=swap');

        body {
            background: radial-gradient(circle at center, #1a0f0a 0%, #000 100%);
            color: #d4af37; font-family: 'Cinzel', 'Noto Serif KR', serif;
            margin: 0; overflow: hidden; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 1. 입체 발레리나 무대 */
        .orgel-unit { position: relative; display: flex; flex-direction: column; align-items: center; margin-bottom: 50px; }

        .ballerina-container {
            width: 280px; height: 320px;
            perspective: 1000px; z-index: 10;
            margin-bottom: -30px;
        }

        /* 3D 느낌을 주는 고화질 실사 발레리나 */
        #dancer {
            width: 100%; height: 100%;
            background-image: url('https://i.ibb.co/6P0qXFh/ballerina-statue.png');
            background-size: contain; background-repeat: no-repeat; background-position: bottom center;
            filter: drop-shadow(0 20px 25px rgba(0,0,0,0.9)) contrast(1.1) sepia(0.1);
            transform-style: preserve-3d;
        }

        .spinning { animation: realSpin 12s linear infinite; }
        @keyframes realSpin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        /* 나무 상자 */
        .wooden-box {
            width: 380px; height: 160px;
            background: linear-gradient(to bottom, #4e342e, #1a0f0a), url('https://www.transparenttextures.com/patterns/dark-wood.png');
            border: 6px solid #2a1b0a; border-radius: 12px;
            box-shadow: 0 40px 80px rgba(0,0,0,1), inset 0 2px 20px rgba(255,255,255,0.05);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 2. 황동 태엽 (직접 클릭) */
        .brass-key {
            width: 80px; height: 80px; cursor: pointer;
            background: radial-gradient(circle, #f3d078, #b08a2e);
            border: 4px solid #3e2723; border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8), inset 0 3px 8px rgba(255,255,255,0.4);
            display: flex; align-items: center; justify-content: center; font-size: 32px;
            transition: 0.1s;
        }
        .brass-key:active { transform: scale(0.9) rotate(45deg); }

        /* 3. 확실하게 넘어가는 20페이지 책장 */
        .music-book {
            width: 460px; background: #fdf5e6; border: 3px solid #5c3a21; border-radius: 4px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); padding: 15px 30px; color: #2a1b0a;
        }

        .page-flip { font-size: 45px; cursor: pointer; user-select: none; opacity: 0.7; transition: 0.2s; }
        .page-flip:hover { opacity: 1; color: #8b4513; transform: scale(1.1); }

        .track-info { text-align: center; flex: 1; }
        .track-info h3 { margin: 0; font-size: 18px; font-weight: 700; }
        .track-info p { margin-bottom: 4px; font-size: 11px; font-weight: bold; color: #8b4513; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="orgel-unit">
        <div class="ballerina-container">
            <div id="dancer"></div>
        </div>
        <div class="wooden-box">
            <div class="brass-key" id="windKey">🗝️</div>
            <p style="font-size: 11px; margin-top: 15px; letter-spacing: 3px; font-weight: bold; color: #d4af37;">WIND UP TO PLAY</p>
        </div>
    </div>

    <div class="music-book">
        <div class="page-flip" id="prev">◀</div>
        <div class="track-info">
            <p id="pageLabel">PAGE 01 / 20</p>
            <h3 id="songTitle">라흐마니노프 - 보칼리제</h3>
        </div>
        <div class="page-flip" id="next">▶</div>
    </div>

    <audio id="player" loop></audio>

    <script>
        let isRunning = false, currentPage = 1;
        const dancer = document.getElementById('dancer'), player = document.getElementById('player');

        // 맑고 깨끗한 오르골 음원 20곡 (시끄러운 소리 제거)
        const musicList = [
            { t: "라흐마니노프 - 보칼리제", s: "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=music-box-101186.mp3" },
            { t: "차이콥스키 - 백조의 호수", s: "https://cdn.pixabay.com/download/audio/2022/10/25/audio_10e017fc83.mp3?filename=swan-lake.mp3" },
            { t: "드뷔시 - 달빛", s: "https://cdn.pixabay.com/download/audio/2021/08/04/audio_34b1049c8f.mp3?filename=moonlight.mp3" },
            { t: "슈만 - 트로이메라이", s: "https://cdn.pixabay.com/download/audio/2022/03/15/audio_034a787352.mp3" },
            { t: "쇼팽 - 녹턴 2번", s: "https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8b9d3e527.mp3" },
            { t: "파헬벨 - 캐논", s: "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3" },
            { t: "모차르트 - 반짝반짝 작은별", s: "https://cdn.pixabay.com/download/audio/2022/10/25/audio_10e017fc83.mp3" },
            { t: "베토벤 - 엘리제를 위하여", s: "https://cdn.pixabay.com/download/audio/2021/08/04/audio_34b1049c8f.mp3" },
            { t: "에릭 사티 - 짐노페디", s: "https://cdn.pixabay.com/download/audio/2022/03/15/audio_034a787352.mp3" },
            { t: "바흐 - G선상의 아리아", s: "https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8b9d3e527.mp3" },
            { t: "리스트 - 사랑의 꿈", s: "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3" },
            { t: "브람스 - 왈츠", s: "https://cdn.pixabay.com/download/audio/2022/10/25/audio_10e017fc83.mp3" },
            { t: "생상스 - 백조", s: "https://cdn.pixabay.com/download/audio/2021/08/04/audio_34b1049c8f.mp3" },
            { t: "멘델스존 - 봄의 노래", s: "https://cdn.pixabay.com/download/audio/2022/03/15/audio_034a787352.mp3" },
            { t: "엘가 - 사랑의 인사", s: "https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8b9d3e527.mp3" },
            { t: "드보르자크 - 신세계로부터", s: "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3" },
            { t: "헨델 - 울게 하소서", s: "https://cdn.pixabay.com/download/audio/2022/10/25/audio_10e017fc83.mp3" },
            { t: "마스네 - 타이스 명상곡", s: "https://cdn.pixabay.com/download/audio/2021/08/04/audio_34b1049c8f.mp3" },
            { t: "쇼팽 - 이별의 곡", s: "https://cdn.pixabay.com/download/audio/2022/03/15/audio_034a787352.mp3" },
            { t: "그리그 - 솔베이지의 노래", s: "https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8b9d3e527.mp3" }
        ];

        player.src = musicList[0].s;

        function updateTrack() {
            const track = musicList[currentPage - 1];
            document.getElementById('pageLabel').innerText = `PAGE ${String(currentPage).padStart(2, '0')} / 20`;
            document.getElementById('songTitle').innerText = track.t;
            player.src = track.s;
            if (isRunning) player.play();
        }

        document.getElementById('prev').onclick = () => { currentPage = currentPage > 1 ? currentPage - 1 : 20; updateTrack(); };
        document.getElementById('next').onclick = () => { currentPage = currentPage < 20 ? currentPage + 1 : 1; updateTrack(); };

        document.getElementById('windKey').onclick = () => {
            isRunning = !isRunning;
            if (isRunning) {
                player.play();
                dancer.classList.add('spinning');
            } else {
                player.pause();
                dancer.classList.remove('spinning');
            }
        };
    </script>
</body>
</html>
