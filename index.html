<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Scroll Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;400&display=swap');

        * { box-sizing: border-box; }
        
        /* 스크롤바 디자인 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }

        body {
            margin: 0; padding: 0;
            min-height: 100vh;
            font-family: 'Cinzel', 'Noto Serif KR', serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            /* 기본 배경 사진 */
            background-image: url('https://images.unsplash.com/photo-1516478950587-8d076cd771ad?q=80&w=2070');
            background-color: #000;
            display: flex; flex-direction: column; align-items: center;
            overflow-y: auto; /* 위아래 스크롤 가능 */
            overflow-x: hidden;
        }

        /* 상단 네비게이션 (고정 버튼 제거) */
        .top-nav { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .mini-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5); padding: 6px 14px; border-radius: 20px;
            font-size: 8px; cursor: pointer; backdrop-filter: blur(10px);
            letter-spacing: 2px; text-transform: uppercase; transition: 0.3s;
        }
        .mini-btn:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }

        /* 전체를 감싸는 투명 보드 영역 */
        .main-container {
            width: min(92vw, 520px);
            margin-top: 60px; margin-bottom: 80px;
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 20px;
        }

        /* 1. 메인 영상 칸 (스크롤 영역 안으로 이동) */
        .main-video-box {
            width: 100%; height: 320px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; margin-bottom: 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        .main-video-box:hover { background: rgba(255, 255, 255, 0.05); }
        .main-video-box video, .main-video-box img { width: 100%; height: 100%; object-fit: cover; }
        .hint-text { position: absolute; font-size: 8px; color: rgba(255,255,255,0.2); letter-spacing: 3px; text-transform: uppercase; }

        /* 2. 하단 스크롤 게시판 */
        .post-list { width: 100%; display: flex; flex-direction: column; gap: 25px; }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }

        .card-media {
            width: 100%; height: 220px; background: rgba(0,0,0,0.1);
            border-radius: 10px; overflow: hidden; display: flex; 
            align-items: center; justify-content: center; cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-text {
            color: rgba(255, 255, 255, 0.6); font-size: 11px;
            line-height: 1.8; font-family: 'Noto Serif KR';
            word-break: break-all; outline: none;
        }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="top-nav">
        <label class="mini-btn">SET BG<input type="file" id="bgIn" accept="image/*"></label>
    </div>

    <div class="main-container">
        
        <div class="main-video-box" id="mainZone" onclick="document.getElementById('mainFile').click()">
            <p class="hint-text" id="mainHint">Main Media Display</p>
            <input type="file" id="mainFile" accept="video/*,image/*">
        </div>

        <p style="font-size: 7px; color: rgba(255,255,255,0.3); margin-bottom: 20px; letter-spacing: 5px; text-transform: uppercase;">Memory Archives</p>

        <div class="post-list" id="postList">
            <script>
                for(let i=1; i<=20; i++) {
                    document.write(`
                        <div class="card">
                            <div class="card-media" onclick="triggerPostUpload(${i})">
                                <div id="pre-${i}" style="font-size:7px; color:rgba(255,255,255,0.15); letter-spacing:1px;">ADD MEDIA #${String(i).padStart(2, '0')}</div>
                                <input type="file" id="f-${i}" accept="image/*,video/*" onchange="loadCardMedia(event, ${i})">
                            </div>
                            <div class="card-text" contenteditable="true">
                                #${String(i).padStart(2, '0')} Archive. 이곳에 당신의 기록을 남겨주세요. 글이 길어지면 카드가 아래로 늘어나며 전체 페이지를 발밑까지 채우게 됩니다.
                            </div>
                        </div>
                    `);
                }
            </script>
        </div>
    </div>

    <script>
        // 1. 배경 사진 변경
        document.getElementById('bgIn').onchange = (e) => {
            const f = e.target.files[0];
            if(f) document.body.style.backgroundImage = `url(${URL.createObjectURL(f)})`;
        };

        // 2. 메인 미디어 업로드 (비디오/사진)
        document.getElementById('mainFile').onchange = (e) => {
            const f = e.target.files[0];
            if(f) {
                const url = URL.createObjectURL(f);
                const zone = document.getElementById('mainZone');
                document.getElementById('mainHint').style.display = 'none';
                
                if(f.type.startsWith('video')) {
                    zone.innerHTML = `<video src="${url}" autoplay loop muted></video>`;
                } else {
                    zone.innerHTML = `<img src="${url}">`;
                }
            }
        };

        // 3. 게시판 개별 미디어 업로드
        function triggerPostUpload(i) {
            document.getElementById(`f-${i}`).click();
        }

        function loadCardMedia(e, i) {
            const f = e.target.files[0];
            if(f) {
                const url = URL.createObjectURL(f);
                const pre = document.getElementById(`pre-${i}`);
                if(f.type.startsWith('video')) {
                    pre.innerHTML = `<video src="${url}" autoplay loop muted style="width:100%; height:100%; object-fit:cover;"></video>`;
                } else {
                    pre.innerHTML = `<img src="${url}" style="width:100%; height:100%; object-fit:cover;">`;
                }
            }
        }
    </script>
</body>
</html>
