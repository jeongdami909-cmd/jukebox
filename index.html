<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Ballerina Music Box</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 실제 고급 나무 질감 배경 */
        body { 
            background-color: #2c1a12;
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Georgia', serif;
        }

        /* 오르골 본체 (빈티지 나무 상자 느낌) */
        .music-box {
            background: linear-gradient(145deg, #3e2723, #1a1005);
            border: 4px solid #5d4037;
            border-radius: 20px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
            padding: 40px;
            width: 450px;
            text-align: center;
            position: relative;
        }

        /* 사진이 들어가는 턴테이블/무대 */
        .stage {
            width: 250px;
            height: 250px;
            margin: 0 auto 30px;
            border-radius: 50%;
            border: 8px solid #bcaaa4; /* 앤틱 금속 테두리 */
            box-shadow: 0 15px 25px rgba(0,0,0,0.6);
            overflow: hidden;
            position: relative;
        }

        /* 실제 발레리나 사진 */
        #ballerina-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 초기 상태: 정지 */
            transition: transform 0.5s ease;
        }

        /* 사진이 돌아가는 애니메이션 (태엽을 감았을 때) */
        .spinning {
            animation: spinPhoto 10s linear infinite;
        }

        @keyframes spinPhoto {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 묵직한 황동 태엽 버튼 */
        .wind-up-key {
            background: radial-gradient(circle, #ffd54f, #ffb300, #ff8f00);
            border: 2px solid #3e2723;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5), inset 0 5px 10px rgba(255,255,255,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            transition: all 0.2s;
        }
        .wind-up-key:active {
            transform: scale(0.9) rotate(45deg); /* 누를 때 실제로 태엽이 감기는 듯한 회전 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* 20개의 리얼한 곡 선택 버튼 */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #5d4037;
        }

        .song-btn {
            background: linear-gradient(to bottom, #d7ccc8, #8d6e63);
            border: 1px solid #3e2723;
            color: #271c19;
            font-weight: bold;
            padding: 10px 0;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4), inset 0 2px 3px rgba(255,255,255,0.3);
        }
        .song-btn:active, .song-btn.active {
            transform: translateY(3px);
            box-shadow: 0 1px 2px rgba(0,0,0,0.4);
            background: linear-gradient(to bottom, #a1887f, #5d4037);
            color: white;
        }

        /* 현재 재생 중인 곡 표시 액정 */
        .display-screen {
            background: #1a1005;
            color: #ffd54f;
            padding: 10px;
            border-radius: 5px;
            border: 2px inset #5d4037;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 16px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="music-box">
        
        <div class="display-screen" id="current-track-display">
            TRACK 01 READY...
        </div>

        <div class="stage">
            <img id="ballerina-photo" src="https://images.unsplash.com/photo-1516478950587-8d076cd771ad?q=80&w=800&auto=format&fit=crop" alt="Ballerina Music Box">
        </div>

        <button class="wind-up-key" id="wind-up-btn" title="태엽 감기 (재생/정지)">
            🗝️
        </button>

        <div class="button-grid" id="button-container">
            </div>

        <audio id="orgel-audio" loop preload="auto"></audio>

    </div>

    <script>
        const ballerinaPhoto = document.getElementById('ballerina-photo');
        const windUpBtn = document.getElementById('wind-up-btn');
        const audioPlayer = document.getElementById('orgel-audio');
        const buttonContainer = document.getElementById('button-container');
        const displayScreen = document.getElementById('current-track-display');

        let isPlaying = false;
        let currentTrack = 1;

        // 무료 오르골 사운드 샘플 (테스트용으로 3개 곡 번갈아 적용, 실제 앱에서는 20개 고유 링크 필요)
        const musicLinks = [
            "https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=music-box-101186.mp3",
            "https://cdn.pixabay.com/download/audio/2022/10/25/audio_10e017fc83.mp3?filename=music-box-creep-122703.mp3",
            "https://cdn.pixabay.com/download/audio/2021/08/04/audio_34b1049c8f.mp3?filename=music-box-spooky-82672.mp3"
        ];

        // 20개 버튼 생성
        for(let i = 1; i <= 20; i++) {
            const btn = document.createElement('button');
            btn.className = 'song-btn';
            btn.innerText = i;
            if(i === 1) btn.classList.add('active'); // 1번 곡 기본 선택

            btn.onclick = () => {
                // 곡 변경
                currentTrack = i;
                
                // 버튼 스타일 변경
                document.querySelectorAll('.song-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // 액정 표시 변경
                displayScreen.innerText = `PLAYING TRACK ${String(i).padStart(2, '0')}`;
                
                // 곡 설정 (임시로 3개 곡을 반복해서 할당)
                audioPlayer.src = musicLinks[(i - 1) % 3];
                
                // 만약 재생 중이었다면 바로 새 곡 재생
                if(isPlaying) {
                    audioPlayer.play();
                }
            };
            buttonContainer.appendChild(btn);
        }

        // 초기 1번 곡 셋팅
        audioPlayer.src = musicLinks[0];

        // 태엽 감기 클릭 이벤트 (재생/정지)
        windUpBtn.addEventListener('click', () => {
            if (isPlaying) {
                // 정지
                audioPlayer.pause();
                ballerinaPhoto.classList.remove('spinning'); // 사진 회전 멈춤
                displayScreen.innerText = `TRACK ${String(currentTrack).padStart(2, '0')} PAUSED`;
            } else {
                // 재생
                audioPlayer.play();
                ballerinaPhoto.classList.add('spinning'); // 사진 회전 시작
                displayScreen.innerText = `PLAYING TRACK ${String(currentTrack).padStart(2, '0')}`;
            }
            isPlaying = !isPlaying;
        });

    </script>
</body>
</html>
