<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Crystal: Perfect Harmony</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;400&display=swap');

        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        body {
            margin: 0; padding: 0; height: 100vh;
            font-family: 'Cinzel', serif;
            background: #000 fixed center/cover no-repeat;
            background-image: url('https://images.unsplash.com/photo-1516478950587-8d076cd771ad?q=80&w=2070');
            overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }

        /* 옅은 흰색 고스트 버튼 */
        .ghost-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4);
            padding: 3px 8px; border-radius: 10px; font-size: 7px;
            cursor: pointer; backdrop-filter: blur(5px);
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .ghost-btn:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }
        .ghost-btn.active { border-color: rgba(255, 255, 255, 0.8); color: #fff; background: rgba(255, 255, 255, 0.15); }

        /* 상단 네비게이션 */
        .top-nav { position: fixed; top: 25px; display: flex; gap: 8px; z-index: 2000; }

        /* 슬라이딩 패널 */
        .sliding-panel {
            position: fixed; bottom: 0; width: 100%; height: 90vh;
            background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(40px);
            border-top: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px 40px 0 0;
            z-index: 500; display: flex; flex-direction: column; align-items: center;
            transform: translateY(calc(100% - 65px)); transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .sliding-panel.is-open { transform: translateY(0); }

        /* 패널 핸들 */
        .panel-handle { width: 100%; height: 65px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .handle-bar { width: 35px; height: 1px; background: rgba(255, 255, 255, 0.2); margin-bottom: 6px; }

        /* 아카이브 리스트 */
        .board-area { width: min(95vw, 520px); flex: 1; overflow-y: auto; padding: 20px 0 100px; display: flex; flex-direction: column; gap: 40px; }
        
        .shutter-card {
            position: relative; width: 100%; min-height: 420px;
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; overflow: hidden;
        }

        /* 100% 슬라이딩 덮개 */
        .shutter-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(35, 35, 35, 0.95); backdrop-filter: blur(15px); z-index: 5;
            padding: 25px; display: flex; flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.1); transition: transform 0.8s ease;
        }
        .shutter-card.open .shutter-cover { transform: translateX(100%); }

        /* 해설 텍스트 접기/펴기 */
        .desc-container { position: relative; flex: 1; overflow: hidden; margin-top: 15px; }
        .desc-text { 
            color: rgba(255, 255, 255, 0.5); font-size: 11px; line-height: 1.8; 
            font-family: 'Noto Serif KR'; outline: none; 
            max-height: 120px; overflow: hidden; transition: max-height 0.5s ease;
        }
        .desc-text.expanded { max-height: 1000px; }
        .read-more-btn { color: rgba(255, 255, 255, 0.3); font-size: 7px; cursor: pointer; margin-top: 5px; text-transform: uppercase; }

        .media-back { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; display: flex; flex-direction: column; }
        .media-display { width: 100%; height: 75%; background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; position: relative; }
        .media-display video, .media-display img { width: 100%; height: 100%; object-fit: cover; }
        
        .media-inner-nav { width: 100%; height: 25%; display: flex; align-items: center; justify-content: center; gap: 8px; border-top: 1px solid rgba(255,255,255,0.05); }

        .faint-white { color: rgba(255, 255, 255, 0.3); font-size: 7px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: bold; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="top-nav">
        <label class="ghost-btn">EDIT BG<input type="file" id="bgIn" accept="image/*"></label>
        <button class="ghost-btn" onclick="deleteBG()">DEL BG</button>
        <button class="ghost-btn" id="bgFixBtn" onclick="toggleBGFix()">FIX BG: ON</button>
    </div>

    <div class="sliding-panel" id="mainPanel">
        <div class="panel-handle" onclick="togglePanel()">
            <div class="handle-bar"></div>
            <span class="faint-white">ARCHIVE</span>
        </div>

        <div class="board-area" id="boardList">
            <div class="shutter-card" id="card-1">
                <div class="media-back">
                    <div class="media-display" id="display-1" onclick="triggerUp(1, 'media')">
                        <p style="color: rgba(255,255,255,0.1); font-size: 7px;">CLICK TO ADD MEDIA</p>
                    </div>
                    <div class="media-inner-nav">
                        <button class="ghost-btn" onclick="toggleShutter(1)">CLOSE</button>
                        <button class="ghost-btn" onclick="triggerUp(1, 'media')">EDIT</button>
                        <button class="ghost-btn" onclick="toggleElementFix(this)">FIX</button>
                        <button class="ghost-btn" style="color: rgba(255, 100, 100, 0.3);" onclick="this.closest('.shutter-card').remove()">DEL</button>
                    </div>
                </div>
                <div class="shutter-cover">
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">
                        <span class="faint-white">#01 SLOT</span>
                        <button class="ghost-btn" onclick="toggleShutter(1)">OPEN VIEW</button>
                    </div>
                    
                    <div class="desc-container">
                        <div style="display: flex; justify-content: space-between;">
                             <span style="font-size: 6px; color: rgba(255,255,255,0.2);">DESCRIPTION</span>
                             <button class="ghost-btn" style="font-size: 5px; padding: 2px 5px;" onclick="toggleElementFix(this)">FIX TEXT</button>
                        </div>
                        <div class="desc-text" id="text-1" contenteditable="true">
                            여기에 아주 긴 해설을 입력해 보세요. 글이 길어지면 자동으로 [READ MORE] 버튼이 나타나며, 버튼을 누르면 전체 내용을 확인할 수 있습니다. 모든 요소에는 개별 FIX 버튼이 있어 원하는 부분만 강조하거나 상태를 고정할 수 있습니다.
                        </div>
                        <div class="read-more-btn" id="rm-1" onclick="toggleText(1)">[ READ MORE ]</div>
                    </div>

                    <div style="display: flex; gap: 8px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; align-items: center;">
                        <button class="ghost-btn" onclick="triggerUp(1, 'audio')">MUSIC</button>
                        <button class="ghost-btn" id="play-1" onclick="togglePlay(1)">PLAY</button>
                        <button class="ghost-btn" onclick="toggleElementFix(this)">FIX MUSIC</button>
                        <audio id="player-1" loop></audio>
                    </div>
                </div>
                <input type="file" id="media-in-1" accept="image/*,video/*" onchange="loadMedia(event, 1)">
                <input type="file" id="audio-in-1" accept="audio/*" onchange="loadAudio(event, 1)">
            </div>
        </div>

        <div style="width: 100%; height: 80px; display: flex; align-items: center; justify-content: center;">
            <button class="ghost-btn" style="padding: 10px 40px;" onclick="addNewCard()">+ NEW ARCHIVE</button>
        </div>
    </div>

    <script>
        let cardCount = 1;
        let isBGFixed = true;

        // 배경 제어
        document.getElementById('bgIn').onchange = (e) => {
            const f = e.target.files[0];
            if(f) document.body.style.backgroundImage = `url(${URL.createObjectURL(f)})`;
        };
        function deleteBG() { if(confirm("Delete BG?")) document.body.style.backgroundImage = "none"; }
        function toggleBGFix() {
            isBGFixed = !isBGFixed;
            document.body.style.backgroundAttachment = isBGFixed ? "fixed" : "scroll";
            document.getElementById('bgFixBtn').innerText = isBGFixed ? "FIX BG: ON" : "FIX BG: OFF";
        }

        // 요소 고정 기능 (FIX)
        function toggleElementFix(btn) {
            btn.classList.toggle('active');
            const target = btn.parentElement.nextElementSibling || btn.closest('.shutter-card');
            if (btn.classList.contains('active')) {
                target.style.boxShadow = "0 0 10px rgba(255, 255, 255, 0.1)";
            } else {
                target.style.boxShadow = "none";
            }
        }

        // 글 접기/펴기 기능
        function toggleText(id) {
            const text = document.getElementById(`text-${id}`);
            const btn = document.getElementById(`rm-${id}`);
            text.classList.toggle('expanded');
            btn.innerText = text.classList.contains('expanded') ? "[ CLOSE ]" : "[ READ MORE ]";
        }

        // 패널 및 셔터 제어
        function togglePanel() { document.getElementById('mainPanel').classList.toggle('is-open'); }
        function toggleShutter(id) { document.getElementById(`card-${id}`).classList.toggle('open'); }

        // 무한 추가 기능
        function addNewCard() {
            cardCount++;
            const list = document.getElementById('boardList');
            const newCard = document.createElement('div');
            newCard.className = 'shutter-card';
            newCard.id = `card-${cardCount}`;
            newCard.innerHTML = `
                <div class="media-back">
                    <div class="media-display" id="display-${cardCount}" onclick="triggerUp(${cardCount}, 'media')">
                        <p style="color: rgba(255,255,255,0.1); font-size: 7px;">CLICK TO ADD MEDIA</p>
                    </div>
                    <div class="media-inner-nav">
                        <button class="ghost-btn" onclick="toggleShutter(${cardCount})">CLOSE</button>
                        <button class="ghost-btn" onclick="triggerUp(${cardCount}, 'media')">EDIT</button>
                        <button class="ghost-btn" onclick="toggleElementFix(this)">FIX</button>
                        <button class="ghost-btn" style="color: rgba(255, 100, 100, 0.3);" onclick="this.closest('.shutter-card').remove()">DEL</button>
                    </div>
                </div>
                <div class="shutter-cover">
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">
                        <span class="faint-white">#${String(cardCount).padStart(2, '0')} SLOT</span>
                        <button class="ghost-btn" onclick="toggleShutter(${cardCount})">OPEN VIEW</button>
                    </div>
                    <div class="desc-container">
                        <div style="display: flex; justify-content: space-between;">
                             <span style="font-size: 6px; color: rgba(255,255,255,0.2);">DESCRIPTION</span>
                             <button class="ghost-btn" style="font-size: 5px; padding: 2px 5px;" onclick="toggleElementFix(this)">FIX TEXT</button>
                        </div>
                        <div class="desc-text" id="text-${cardCount}" contenteditable="true">Write a long story here...</div>
                        <div class="read-more-btn" id="rm-${cardCount}" onclick="toggleText(${cardCount})">[ READ MORE ]</div>
                    </div>
                    <div style="display: flex; gap: 8px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; align-items: center;">
                        <button class="ghost-btn" onclick="triggerUp(${cardCount}, 'audio')">MUSIC</button>
                        <button class="ghost-btn" id="play-${cardCount}" onclick="togglePlay(${cardCount})">PLAY</button>
                        <button class="ghost-btn" onclick="toggleElementFix(this)">FIX MUSIC</button>
                        <audio id="player-${cardCount}" loop></audio>
                    </div>
                </div>
                <input type="file" id="media-in-${cardCount}" accept="image/*,video/*" onchange="loadMedia(event, ${cardCount})">
                <input type="file" id="audio-in-${cardCount}" accept="audio/*" onchange="loadAudio(event, ${cardCount})">
            `;
            list.appendChild(newCard);
        }

        function triggerUp(id, type) { document.getElementById(`${type}-in-${id}`).click(); }
        function loadMedia(e, id) {
            const f = e.target.files[0];
            if(f) {
                const url = URL.createObjectURL(f);
                document.getElementById(`display-${id}`).innerHTML = f.type.startsWith('video') ? `<video src="${url}" autoplay loop muted></video>` : `<img src="${url}">`;
            }
        }
        function loadAudio(e, id) {
            const f = e.target.files[0];
            if(f) document.getElementById(`player-${id}`).src = URL.createObjectURL(f);
        }
        function togglePlay(id) {
            const p = document.getElementById(`player-${id}`);
            const b = document.getElementById(`play-${id}`);
            if(p.paused) { p.play(); b.innerText = "PAUSE"; }
            else { p.pause(); b.innerText = "PLAY"; }
        }
    </script>
</body>
</html>
