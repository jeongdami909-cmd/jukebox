<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Infinity Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;400&display=swap');

        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Cinzel', 'Noto Serif KR', serif;
            background: #000 fixed center/cover no-repeat;
            background-image: url('https://images.unsplash.com/photo-1516478950587-8d076cd771ad?q=80&w=2070');
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* 상단 네비게이션 */
        .nav-bar { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; gap: 10px; }
        .btn-xs {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5); padding: 5px 12px; border-radius: 15px;
            font-size: 8px; cursor: pointer; backdrop-filter: blur(10px);
            text-transform: uppercase; letter-spacing: 1.5px;
        }

        /* 게시판 리스트 영역: 발밑까지 확장 */
        .board-container {
            width: min(95vw, 550px);
            margin-top: 50px;
            display: flex; flex-direction: column;
            padding-bottom: 0; /* 하단 여백 제거 */
        }

        /* 슬라이딩 셔터 카드 */
        .shutter-card {
            position: relative; width: 100%; height: 400px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            border-bottom: none; /* 카드 사이 경계 최소화 */
        }
        .shutter-card:last-of-type { border-bottom: 1px solid rgba(255, 255, 255, 0.08); }

        /* 뒤쪽 미디어 (사진/영상) */
        .media-back {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; display: flex; align-items: center; justify-content: center;
            background: #000;
        }
        .media-back video, .media-back img { width: 100%; height: 100%; object-fit: cover; }

        /* 옆으로 밀리는 불투명 회색 덮개 */
        .shutter-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(30, 30, 30, 0.9); /* 불투명 엷은 회색 */
            backdrop-filter: blur(15px);
            z-index: 5; transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
            padding: 25px; display: flex; flex-direction: column;
        }
        
        /* 셔터 오픈 상태 */
        .shutter-card.open .shutter-cover { transform: translateX(95%); }

        .desc-text {
            color: rgba(255, 255, 255, 0.7); font-size: 11px; line-height: 1.8;
            font-family: 'Noto Serif KR'; overflow-y: auto; flex: 1;
            outline: none; margin-top: 10px;
        }

        /* 오디오 플레이어 칸 */
        .audio-slot {
            margin-top: 15px; display: flex; align-items: center; gap: 8px;
            background: rgba(255, 255, 255, 0.03); padding: 8px; border-radius: 8px;
        }

        /* 무한 플러스 버튼: 사이트 맨 아래 고정 */
        .add-btn {
            width: 100%; height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #d4af37; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
            margin-bottom: 0;
        }
        .add-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <label class="btn-xs">BG UP<input type="file" id="bgIn" accept="image/*"></label>
    </div>

    <div class="board-container" id="boardList">
        <div class="shutter-card" id="card-1">
            <div class="media-back" id="media-1" onclick="triggerUp(1, 'media')">
                <p style="font-size: 7px; color: rgba(255,255,255,0.2); letter-spacing: 2px;">CLICK TO ADD VIDEO/PHOTO</p>
            </div>
            <div class="shutter-cover">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 8px; color: #d4af37; letter-spacing: 3px;">ARCHIVE #01</span>
                    <button class="btn-xs" onclick="toggleShutter(1)">OPEN</button>
                </div>
                <div class="desc-text" contenteditable="true">
                    여기에 해설을 입력하세요. 이 불투명한 덮개는 옆으로 밀리며 뒤에 숨겨진 미디어를 보여줍니다. 게시판은 사이트 발밑까지 계속해서 추가됩니다.
                </div>
                <div class="audio-slot">
                    <button class="btn-xs" onclick="triggerUp(1, 'audio')">SET MUSIC</button>
                    <button class="btn-xs" id="play-1" onclick="togglePlay(1)">PLAY</button>
                    <audio id="player-1" loop></audio>
                </div>
            </div>
            <input type="file" id="media-in-1" accept="image/*,video/*" onchange="loadMedia(event, 1)">
            <input type="file" id="audio-in-1" accept="audio/*" onchange="loadAudio(event, 1)">
        </div>
    </div>

    <div class="add-btn" onclick="addNewCard()">+ ADD NEW MEMORY</div>

    <script>
        let cardCount = 1;

        // 배경 업로드
        document.getElementById('bgIn').onchange = (e) => {
            const f = e.target.files[0];
            if(f) document.body.style.backgroundImage = `url(${URL.createObjectURL(f)})`;
        };

        // 셔터 토글
        function toggleShutter(id) {
            document.getElementById(`card-${id}`).classList.toggle('open');
        }

        // 무한 추가
        function addNewCard() {
            cardCount++;
            const list = document.getElementById('boardList');
            const newCard = document.createElement('div');
            newCard.className = 'shutter-card';
            newCard.id = `card-${cardCount}`;
            newCard.innerHTML = `
                <div class="media-back" id="media-${cardCount}" onclick="triggerUp(${cardCount}, 'media')">
                    <p style="font-size: 7px; color: rgba(255,255,255,0.2); letter-spacing: 2px;">CLICK TO ADD VIDEO/PHOTO</p>
                </div>
                <div class="shutter-cover">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 8px; color: #d4af37; letter-spacing: 3px;">ARCHIVE #${String(cardCount).padStart(2, '0')}</span>
                        <button class="btn-xs" onclick="toggleShutter(${cardCount})">OPEN</button>
                    </div>
                    <div class="desc-text" contenteditable="true">새로운 기록을 남겨보세요...</div>
                    <div class="audio-slot">
                        <button class="btn-xs" onclick="triggerUp(${cardCount}, 'audio')">SET MUSIC</button>
                        <button class="btn-xs" id="play-${cardCount}" onclick="togglePlay(${cardCount})">PLAY</button>
                        <audio id="player-${cardCount}" loop></audio>
                    </div>
                </div>
                <input type="file" id="media-in-${cardCount}" accept="image/*,video/*" onchange="loadMedia(event, ${cardCount})">
                <input type="file" id="audio-in-${cardCount}" accept="audio/*" onchange="loadAudio(event, ${cardCount})">
            `;
            list.appendChild(newCard);
            window.scrollTo(0, document.body.scrollHeight); // 추가 시 아래로 자동 스크롤
        }

        function triggerUp(id, type) { document.getElementById(`${type}-in-${id}`).click(); }

        function loadMedia(e, id) {
            const f = e.target.files[0];
            if(f) {
                const url = URL.createObjectURL(f);
                const back = document.getElementById(`media-${id}`);
                back.innerHTML = f.type.startsWith('video') ? `<video src="${url}" autoplay loop muted></video>` : `<img src="${url}">`;
            }
        }

        function loadAudio(e, id) {
            const f = e.target.files[0];
            if(f) document.getElementById(`player-${id}`).src = URL.createObjectURL(f);
        }

        function togglePlay(id) {
            const p = document.getElementById(`player-${id}`);
            const b = document.getElementById(`play-${id}`);
            if(p.paused) { p.play(); b.innerText = "PAUSE"; }
            else { p.pause(); b.innerText = "PLAY"; }
        }
    </script>
</body>
</html>
