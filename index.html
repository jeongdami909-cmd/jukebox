<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA-GOL: Curtain of Memories</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;400&display=swap');

        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Cinzel', 'Noto Serif KR', serif;
            background-size: cover; background-position: center; background-attachment: fixed;
            background-color: #000;
        }

        /* 1. 유럽식 골드 프레임 (6263.jpg) */
        .royal-mirror {
            position: relative; width: 550px; height: 750px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border-radius: 275px 275px 50px 50px;
            border: 15px solid transparent;
            border-image: linear-gradient(to bottom, #d4af37, #f3d078, #b08a2e) 1;
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.3);
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; z-index: 10;
        }

        /* 2. 창문 & 커튼 시스템 */
        .window-stage {
            position: relative; width: 85%; height: 55%; margin-top: 55px;
            border-radius: 200px 200px 20px 20px;
            overflow: hidden; background: #111;
            border: 2px solid rgba(212, 175, 55, 0.3);
        }

        #bgVideo { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }

        .curtain {
            position: absolute; top: 0; width: 50%; height: 100%;
            background: rgba(200, 200, 200, 0.4); /* 엷은 회색 반투명 */
            backdrop-filter: blur(8px);
            z-index: 5; transition: transform 2s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }
        .curtain-left { left: 0; border-right: 1px solid rgba(255,255,255,0.2); }
        .curtain-right { right: 0; border-left: 1px solid rgba(255,255,255,0.2); }

        /* 커튼이 열리는 상태 */
        .opened .curtain-left { transform: translateX(-100%); }
        .opened .curtain-right { transform: translateX(100%); }

        /* 3. 반투명 화이트 화장대 & 서랍 */
        .vanity-crystal {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            display: flex; flex-direction: column; align-items: center;
            padding-bottom: 30px; z-index: 20;
        }

        .drawer-box {
            width: 95%; height: 0;
            display: flex; gap: 15px; overflow-x: auto;
            transition: height 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .drawer-box.open { height: 180px; padding-top: 20px; border-top: 1px solid rgba(212, 175, 55, 0.5); }

        /* 돌아가는 황금 태엽 */
        .key-wrapper { width: 80px; height: 80px; margin-top: -40px; z-index: 100; }
        .golden-key {
            width: 100%; height: 100%;
            background: radial-gradient(circle, #f3d078, #b08a2e);
            border: 3px solid #1a0f0a; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.6s ease;
        }

        /* 4. 투명 버튼 & 스냅사진 슬롯 */
        .ghost-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #d4af37; padding: 10px 20px; border-radius: 30px;
            font-size: 11px; cursor: pointer; backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        .ghost-btn:hover { background: rgba(212, 175, 55, 0.1); border-color: #d4af37; }

        .snap-item {
            min-width: 110px; height: 140px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .menu-bar { position: fixed; top: 30px; display: flex; gap: 15px; z-index: 1000; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="menu-bar">
        <label class="ghost-btn">🌆 창밖 영상 업로드<input type="file" id="videoIn" accept="video/*"></label>
        <label class="ghost-btn">🖼️ 배경 사진 업로드<input type="file" id="bgIn" accept="image/*"></label>
        <div class="ghost-btn" id="lockBtn">🔒 사이트 고정</div>
    </div>

    <div class="royal-mirror" id="mirrorMain">
        <h2 style="color: #d4af37; margin-top: 40px; letter-spacing: 12px; font-size: 16px; opacity: 0.6;">AURA-GOL</h2>
        
        <div class="window-stage" id="windowStage">
            <video id="bgVideo" loop muted autoplay></video>
            <div class="curtain curtain-left"></div>
            <div class="curtain curtain-right"></div>
        </div>

        <div class="vanity-crystal">
            <div class="key-wrapper">
                <div class="golden-key" id="windKey">🗝️</div>
            </div>
            <p style="font-size: 9px; color: #d4af37; margin-top: 10px; font-weight: bold; letter-spacing: 3px;">WIND FOR THE VIEW</p>
            
            <div class="drawer-box" id="drawer">
                <script>
                    for(let i=1; i<=20; i++) {
                        document.write(`
                            <div class="snap-item" onclick="handleUpload(${i})">
                                <div id="pre-${i}" style="width:100%; height:90px; overflow:hidden; display:flex; align-items:center; justify-content:center; color:#444; font-size:8px;">No Data</div>
                                <p style="margin-top:10px; font-size:9px; font-weight:bold; color:#d4af37;">SLOT ${String(i).padStart(2, '0')}</p>
                                <input type="file" id="m-${i}" accept="image/*,video/*" onchange="previewMedia(event, ${i})">
                                <input type="file" id="a-${i}" accept="audio/*" onchange="previewAudio(${i})">
                            </div>
                        `);
                    }
                </script>
            </div>
        </div>
    </div>

    <audio id="orgelAudio" loop></audio>

    <script>
        let energy = 0;
        let rot = 0;
        const slots = Array(21).fill(null).map(() => ({ media: null, audio: null }));

        // 1. 영상 및 배경 업로드
        document.getElementById('videoIn').onchange = (e) => {
            const f = e.target.files[0];
            if(f) document.getElementById('bgVideo').src = URL.createObjectURL(f);
        };
        document.getElementById('bgIn').onchange = (e) => {
            const f = e.target.files[0];
            if(f) document.body.style.backgroundImage = `url(${URL.createObjectURL(f)})`;
        };

        // 2. 태엽 감기 & 커튼/서랍 열기
        const key = document.getElementById('windKey');
        const stage = document.getElementById('windowStage');
        const drawer = document.getElementById('drawer');

        key.onclick = () => {
            rot += 360;
            key.style.transform = `rotate(${rot}deg)`;
            energy += 25;

            if(energy >= 100) {
                stage.classList.add('opened'); // 커튼 열기
                drawer.classList.add('open'); // 서랍 열기
                energy = 100;
            }
        };

        // 3. 개별 스냅 업로드
        function handleUpload(i) {
            if(confirm(`SLOT ${i}에 사진/영상을 넣으시겠습니까?\n(취소 시 음악 선택)`)) {
                document.getElementById(`m-${i}`).click();
            } else {
                document.getElementById(`a-${i}`).click();
            }
        }

        function previewMedia(e, i) {
            const f = e.target.files[0];
            if(f) {
                const url = URL.createObjectURL(f);
                const pre = document.getElementById(`pre-${i}`);
                if(f.type.startsWith('video')) {
                    pre.innerHTML = `<video src="${url}" style="width:100%; height:100%; object-fit:cover;" muted autoplay loop></video>`;
                } else {
                    pre.innerHTML = `<img src="${url}" style="width:100%; height:100%; object-fit:cover;">`;
                }
            }
        }

        function previewAudio(i) {
            alert(`${i}번 오르골 음악이 장착되었습니다.`);
        }
        
        // 고정 기능
        document.getElementById('lockBtn').onclick = () => {
            const main = document.getElementById('mirrorMain');
            main.style.position = 'fixed';
            main.style.top = '50%'; main.style.left = '50%';
            main.style.transform = 'translate(-50%, -50%)';
            alert("프레임이 화면 중앙에 고정되었습니다.");
        };
    </script>
</body>
</html>
