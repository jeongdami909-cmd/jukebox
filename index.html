<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Crystal Archive v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;400&display=swap');

        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }

        body {
            margin: 0; padding: 0; height: 100vh;
            font-family: 'Cinzel', serif;
            background: #000 fixed center/cover no-repeat;
            background-image: url('https://images.unsplash.com/photo-1516478950587-8d076cd771ad?q=80&w=2070');
            overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }

        /* 옅은 흰색 고스트 버튼 */
        .ghost-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4);
            padding: 4px 10px; border-radius: 12px; font-size: 7px;
            cursor: pointer; backdrop-filter: blur(5px);
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .ghost-btn:hover { background: rgba(255, 255, 255, 0.08); color: #fff; border-color: rgba(255, 255, 255, 0.3); }

        /* 슬라이딩 패널 (발밑 숨김) */
        .sliding-panel {
            position: fixed; bottom: 0; width: 100%; height: 90vh;
            background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(35px);
            border-top: 1px solid rgba(255, 255, 255, 0.08); border-radius: 35px 35px 0 0;
            z-index: 500; display: flex; flex-direction: column; align-items: center;
            transform: translateY(calc(100% - 65px)); transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .sliding-panel.is-open { transform: translateY(0); }

        /* 투명 핸들 */
        .panel-handle {
            width: 100%; height: 65px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .handle-bar { width: 35px; height: 1px; background: rgba(255, 255, 255, 0.2); margin-bottom: 6px; }

        /* 게시판 리스트 */
        .board-area { width: min(95vw, 550px); flex: 1; overflow-y: auto; padding: 20px 0 80px; display: flex; flex-direction: column; gap: 35px; }
        
        /* 셔터 카드 */
        .shutter-card {
            position: relative; width: 100%; height: 380px;
            background: rgba(0,0,0,0.1); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; overflow: hidden;
            transition: border 0.3s;
        }
        .shutter-card.fixed { border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 0 20px rgba(255, 255, 255, 0.1); }

        /* 옆으로 밀리는 덮개 */
        .shutter-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(35, 35, 35, 0.92); backdrop-filter: blur(15px); z-index: 5;
            padding: 25px; display: flex; flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.08); transition: transform 0.8s ease;
        }
        .shutter-card.open .shutter-cover { transform: translateX(95%); }

        .media-back { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; display: flex; align-items: center; justify-content: center; }
        .media-back video, .media-back img { width: 100%; height: 100%; object-fit: cover; }

        .top-nav { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .faint-text { color: rgba(255, 255, 255, 0.3); font-size: 8px; letter-spacing: 2.5px; text-transform: uppercase; }
        .desc-text { color: rgba(255, 255, 255, 0.5); font-size: 11px; line-height: 1.8; font-family: 'Noto Serif KR'; outline: none; margin-top: 12px; flex: 1; overflow-y: auto; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="top-nav">
        <label class="ghost-btn" style="padding: 8px 15px;">SET BG<input type="file" id="bgIn" accept="image/*"></label>
    </div>

    <div class="sliding-panel" id="mainPanel">
        <div class="panel-handle" onclick="togglePanel()">
            <div class="handle-bar"></div>
            <span class="faint-text">ARCHIVE</span>
        </div>

        <div class="board-area" id="boardList">
            <div class="shutter-card" id="card-1">
                <div class="media-back" id="media-1" onclick="triggerUp(1, 'media')">
                    <p style="color: rgba(255,255,255,0.1); font-size: 7px; letter-spacing: 2px;">CLICK TO ADD MEDIA</p>
                </div>
                <div class="shutter-cover">
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 10px;">
                        <span style="font-size: 8px; color: rgba(255,255,255,0.3); letter-spacing: 2px;">#01 SLOT</span>
                        <div style="display: flex; gap: 4px;">
                            <button class="ghost-btn" onclick="toggleShutter(1)">OPEN</button>
                            <button class="ghost-btn" onclick="triggerUp(1, 'media')">EDIT</button>
                            <button class="ghost-btn" onclick="toggleFix(1)">FIX</button>
                            <button class="ghost-btn" style="color: rgba(255, 100, 100, 0.3);" onclick="deleteCard(1)">DEL</button>
                        </div>
                    </div>
                    <div class="desc-text" contenteditable="true">Write your story here...</div>
                    <div style="display: flex; gap: 8px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px;">
                        <button class="ghost-btn" onclick="triggerUp(1, 'audio')">MUSIC</button>
                        <button class="ghost-btn" id="play-1" onclick="togglePlay(1)">PLAY</button>
                        <audio id="player-1" loop></audio>
                    </div>
                </div>
                <input type="file" id="media-in-1" accept="image/*,video/*" onchange="loadMedia(event, 1)">
                <input type="file" id="audio-in-1" accept="audio/*" onchange="loadAudio(event, 1)">
            </div>
        </div>

        <div style="width: 100%; height: 70px; display: flex; align-items: center; justify-content: center;">
            <button class="ghost-btn" style="padding: 10px 40px;" onclick="addNewCard()">+ NEW ARCHIVE</button>
        </div>
    </div>

    <script>
        let cardCount = 1;

        // 배경 설정
        document.getElementById('bgIn').onchange = (e) => {
            const f = e.target.files[0];
            if(f) document.body.style.backgroundImage = `url(${URL.createObjectURL(f)})`;
        };

        // 패널 및 셔터 제어
        function togglePanel() { document.getElementById('mainPanel').classList.toggle('is-open'); }
        function toggleShutter(id) { document.getElementById(`card-${id}`).classList.toggle('open'); }
        
        // 고정 기능 (FIX)
        function toggleFix(id) { document.getElementById(`card-${id}`).classList.toggle('fixed'); }

        // 삭제 기능 (DELETE)
        function deleteCard(id) {
            if(confirm(`Delete Archive #${id}?`)) {
                const card = document.getElementById(`card-${id}`);
                card.style.opacity = '0';
                setTimeout(() => card.remove(), 300);
            }
        }

        // 무한 추가 기능
        function addNewCard() {
            cardCount++;
            const list = document.getElementById('boardList');
            const newCard = document.createElement('div');
            newCard.className = 'shutter-card';
            newCard.id = `card-${cardCount}`;
            newCard.innerHTML = `
                <div class="media-back" id="media-${cardCount}" onclick="triggerUp(${cardCount}, 'media')"></div>
                <div class="shutter-cover">
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 10px;">
                        <span style="font-size: 8px; color: rgba(255,255,255,0.3); letter-spacing: 2px;">#${String(cardCount).padStart(2, '0')} SLOT</span>
                        <div style="display: flex; gap: 4px;">
                            <button class="ghost-btn" onclick="toggleShutter(${cardCount})">OPEN</button>
                            <button class="ghost-btn" onclick="triggerUp(${cardCount}, 'media')">EDIT</button>
                            <button class="ghost-btn" onclick="toggleFix(${cardCount})">FIX</button>
                            <button class="ghost-btn" style="color: rgba(255, 100, 100, 0.3);" onclick="deleteCard(${cardCount})">DEL</button>
                        </div>
                    </div>
                    <div class="desc-text" contenteditable="true">Record a new memory...</div>
                    <div style="display: flex; gap: 8px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px;">
                        <button class="ghost-btn" onclick="triggerUp(${cardCount}, 'audio')">MUSIC</button>
                        <button class="ghost-btn" id="play-${cardCount}" onclick="togglePlay(${cardCount})">PLAY</button>
                        <audio id="player-${cardCount}" loop></audio>
                    </div>
                </div>
                <input type="file" id="media-in-${cardCount}" accept="image/*,video/*" onchange="loadMedia(event, ${cardCount})">
                <input type="file" id="audio-in-${cardCount}" accept="audio/*" onchange="loadAudio(event, ${cardCount})">
            `;
            list.appendChild(newCard);
            list.scrollTo({ top: list.scrollHeight, behavior: 'smooth' });
        }

        function triggerUp(id, type) { document.getElementById(`${type}-in-${id}`).click(); }
        function loadMedia(e, id) {
            const f = e.target.files[0];
            if(f) {
                const url = URL.createObjectURL(f);
                const back = document.getElementById(`media-${id}`);
                back.innerHTML = f.type.startsWith('video') ? `<video src="${url}" autoplay loop muted></video>` : `<img src="${url}">`;
            }
        }
        function loadAudio(e, id) {
            const f = e.target.files[0];
            if(f) document.getElementById(`player-${id}`).src = URL.createObjectURL(f);
        }
        function togglePlay(id) {
            const p = document.getElementById(`player-${id}`);
            const b = document.getElementById(`play-${id}`);
            if(p.paused) { p.play(); b.innerText = "PAUSE"; }
            else { p.pause(); b.innerText = "PLAY"; }
        }
    </script>
</body>
</html>
