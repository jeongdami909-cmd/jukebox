<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA-GOL: Eternal Infinity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;400&display=swap');
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Cinzel', serif;
            background: #000 fixed center/cover no-repeat;
            background-image: url('https://images.unsplash.com/photo-1516478950587-8d076cd771ad?q=80&w=2070');
            overflow-x: hidden; display: flex; flex-direction: column; align-items: center;
        }

        .ghost-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4); padding: 4px 10px; border-radius: 12px; font-size: 7px;
            cursor: pointer; backdrop-filter: blur(5px); text-transform: uppercase; letter-spacing: 1.5px;
        }
        .ghost-btn.active { border-color: rgba(255, 255, 255, 0.8); color: #fff; background: rgba(255, 255, 255, 0.15); }

        .top-nav { position: fixed; top: 30px; display: flex; gap: 8px; z-index: 2000; }

        /* 발밑 슬라이딩 패널 */
        .sliding-panel {
            position: fixed; bottom: 0; width: 100%; height: 90vh;
            background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(45px);
            border-top: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px 40px 0 0;
            z-index: 500; display: flex; flex-direction: column; align-items: center;
            transform: translateY(calc(100% - 70px)); transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .sliding-panel.is-open { transform: translateY(0); }

        .panel-handle { width: 100%; height: 70px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .handle-bar { width: 40px; height: 1px; background: rgba(255, 255, 255, 0.2); margin-bottom: 8px; }

        .board-area { width: min(95vw, 550px); flex: 1; overflow-y: auto; padding: 20px 0 100px; display: flex; flex-direction: column; gap: 40px; }
        
        /* 셔터 카드: 높이가 유동적으로 변함 */
        .shutter-card {
            position: relative; width: 100%; min-height: 450px;
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; overflow: hidden;
            display: flex; flex-direction: column;
        }

        .shutter-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(40, 40, 40, 0.96); backdrop-filter: blur(15px); z-index: 10;
            padding: 30px; display: flex; flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.1); transition: transform 0.8s ease;
        }
        .shutter-card.open .shutter-cover { transform: translateX(100%); }

        /* [핵심] 인피니티 텍스트 로직 */
        .desc-container { position: relative; margin-top: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .desc-text { 
            color: rgba(255, 255, 255, 0.5); font-size: 11px; line-height: 2; 
            font-family: 'Noto Serif KR'; outline: none; 
            max-height: 160px; overflow: hidden; transition: max-height 0.7s ease;
        }
        .desc-text.expanded { max-height: 5000px; } /* 글이 길어지면 무한 확장 */
        .read-more-btn { color: rgba(255, 255, 255, 0.3); font-size: 7px; cursor: pointer; margin-top: 15px; text-transform: uppercase; letter-spacing: 2px; text-align: right; }

        .media-back { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; display: flex; flex-direction: column; }
        .media-display { width: 100%; height: 75%; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .media-display video, .media-display img { width: 100%; height: 100%; object-fit: cover; }
        
        .media-inner-nav { width: 100%; height: 25%; display: flex; align-items: center; justify-content: center; gap: 8px; border-top: 1px solid rgba(255,255,255,0.05); }

        .faint-white { color: rgba(255, 255, 255, 0.3); font-size: 8px; letter-spacing: 3px; text-transform: uppercase; font-weight: bold; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="top-nav">
        <label class="ghost-btn">EDIT BG<input type="file" id="bgIn" accept="image/*"></label>
        <button class="ghost-btn" onclick="deleteBG()">DEL BG</button>
        <button class="ghost-btn" id="bgFixBtn" onclick="toggleBGFix()">FIX BG: ON</button>
    </div>

    <div class="sliding-panel" id="mainPanel">
        <div class="panel-handle" onclick="togglePanel()">
            <div class="handle-bar"></div>
            <span class="faint-white">ARCHIVE</span>
        </div>

        <div class="board-area" id="boardList">
            </div>

        <div style="width: 100%; height: 100px; display: flex; align-items: center; justify-content: center;">
            <button class="ghost-btn" style="padding: 10px 40px;" onclick="addNewCard()">+ NEW ARCHIVE</button>
        </div>
    </div>

    <script>
        // --- 1. Bulletproof IndexedDB ---
        let db;
        const dbName = "AuraGolFinalDB";
        const request = indexedDB.open(dbName, 1);

        request.onupgradeneeded = e => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("slots")) db.createObjectStore("slots", { keyPath: "id" });
            if (!db.objectStoreNames.contains("settings")) db.createObjectStore("settings", { keyPath: "id" });
        };

        request.onsuccess = e => {
            db = e.target.result;
            loadData();
        };

        async function saveData(store, data) {
            const tx = db.transaction(store, "readwrite");
            tx.objectStore(store).put(data);
        }

        async function getData(store, id) {
            return new Promise(res => {
                const tx = db.transaction(store, "readonly");
                const req = tx.objectStore(store).get(id);
                req.onsuccess = () => res(req.result);
            });
        }

        // --- 2. UI Rendering & Interaction ---
        let cardCount = 0;
        let isBGFixed = true;

        async function loadData() {
            const bg = await getData("settings", "bg");
            if(bg && bg.file) document.body.style.backgroundImage = `url(${URL.createObjectURL(bg.file)})`;
            
            const tx = db.transaction("slots", "readonly");
            tx.objectStore("slots").openCursor().onsuccess = e => {
                const cursor = e.target.result;
                if(cursor) {
                    renderCard(cursor.value);
                    cardCount = Math.max(cardCount, cursor.value.id);
                    cursor.continue();
                } else if (cardCount === 0) addNewCard();
            };
        }

        // [핵심] 인피니티 텍스트 확장
        function toggleText(id) {
            const text = document.getElementById(`text-${id}`);
            const btn = document.getElementById(`rm-${id}`);
            const card = document.getElementById(`card-${id}`);
            text.classList.toggle('expanded');
            if (text.classList.contains('expanded')) {
                btn.innerText = "[ CLOSE VIEW ]";
                card.style.height = "auto";
            } else {
                btn.innerText = "[ READ MORE ]";
                card.style.height = "450px";
            }
        }

        async function fixElement(id, type) {
            const data = await getData("slots", id) || { id: id, text: "", fixed: {} };
            const btn = document.querySelector(`#card-${id} .fix-${type}`);
            btn.classList.toggle('active');
            data.fixed[type] = btn.classList.contains('active');
            if(type === 'text') data.text = document.getElementById(`text-${id}`).innerText;
            await saveData("slots", data);
            if(data.fixed[type]) alert(`${type.toUpperCase()} FIXED TO BROWSER`);
        }

        async function clearText(id) {
            if(confirm("Clear text?")) {
                document.getElementById(`text-${id}`).innerText = "";
                const data = await getData("slots", id);
                if(data) { data.text = ""; await saveData("slots", data); }
            }
        }

        async function triggerUp(id, type) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = type === 'media' ? 'image/*,video/*' : 'audio/*';
            input.onchange = async e => {
                const f = e.target.files[0];
                if(!f) return;
                const data = await getData("slots", id) || { id: id, text: "", fixed: {} };
                data[type] = f;
                await saveData("slots", data);
                location.reload(); 
            };
            input.click();
        }

        function addNewCard() {
            cardCount++;
            renderCard({ id: cardCount, text: "Write your insight...", fixed: {} });
        }

        function renderCard(data) {
            const list = document.getElementById('boardList');
            const card = document.createElement('div');
            card.className = 'shutter-card';
            card.id = `card-${data.id}`;
            
            const mediaUrl = data.media ? URL.createObjectURL(data.media) : null;
            const audioUrl = data.audio ? URL.createObjectURL(data.audio) : null;

            card.innerHTML = `
                <div class="media-back">
                    <div class="media-display" id="display-${data.id}" onclick="triggerUp(${data.id}, 'media')">
                        ${data.media ? (data.media.type.startsWith('video') ? `<video src="${mediaUrl}" autoplay loop muted></video>` : `<img src="${mediaUrl}">`) : `<p style="color:rgba(255,255,255,0.1); font-size:7px;">ADD MEDIA</p>`}
                    </div>
                    <div class="media-inner-nav">
                        <button class="ghost-btn" onclick="toggleShutter(${data.id})">CLOSE</button>
                        <button class="ghost-btn" onclick="triggerUp(${data.id}, 'media')">EDIT</button>
                        <button class="ghost-btn fix-media ${data.fixed.media ? 'active' : ''}" onclick="fixElement(${data.id}, 'media')">FIX MEDIA</button>
                        <button class="ghost-btn" style="color:rgba(255,100,100,0.3);" onclick="deleteCard(${data.id})">DEL</button>
                    </div>
                </div>
                <div class="shutter-cover">
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px;">
                        <span class="faint-white">#${String(data.id).padStart(2, '0')} ARCHIVE</span>
                        <button class="ghost-btn" onclick="toggleShutter(${data.id})">OPEN VIEW</button>
                    </div>
                    <div class="desc-container">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                             <span style="font-size: 6px; color: rgba(255,255,255,0.2);">INSIGHT</span>
                             <div style="display: flex; gap: 4px;">
                                <button class="ghost-btn" style="font-size: 5px;" onclick="clearText(${data.id})">CLEAR</button>
                                <button class="ghost-btn fix-text ${data.fixed.text ? 'active' : ''}" style="font-size: 5px;" onclick="fixElement(${data.id}, 'text')">FIX TEXT</button>
                             </div>
                        </div>
                        <div class="desc-text" id="text-${data.id}" contenteditable="true">${data.text}</div>
                        <div class="read-more-btn" id="rm-${data.id}" onclick="toggleText(${data.id})">[ READ MORE ]</div>
                    </div>
                    <div style="display: flex; gap: 8px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; align-items: center;">
                        <button class="ghost-btn" onclick="triggerUp(${data.id}, 'audio')">MUSIC</button>
                        <button class="ghost-btn" id="play-${data.id}" onclick="togglePlay(${data.id})">PLAY</button>
                        <button class="ghost-btn fix-audio ${data.fixed.audio ? 'active' : ''}" onclick="fixElement(${data.id}, 'audio')">FIX MUSIC</button>
                        <audio id="player-${data.id}" src="${audioUrl || ''}" loop></audio>
                    </div>
                </div>
            `;
            list.appendChild(card);
        }

        async function deleteCard(id) {
            if(confirm("Delete this?")) {
                const tx = db.transaction("slots", "readwrite");
                tx.objectStore("slots").delete(id);
                document.getElementById(`card-${id}`).remove();
            }
        }

        function togglePanel() { document.getElementById('mainPanel').classList.toggle('is-open'); }
        function toggleShutter(id) { document.getElementById(`card-${id}`).classList.toggle('open'); }
        document.getElementById('bgIn').onchange = async e => { const f = e.target.files[0]; if(f) { await saveData("settings", { id: "bg", file: f }); location.reload(); } };
        async function deleteBG() { if(confirm("Clear BG?")) { const tx = db.transaction("settings", "readwrite"); tx.objectStore("settings").delete("bg"); location.reload(); } }
        function toggleBGFix() { isBGFixed = !isBGFixed; document.body.style.backgroundAttachment = isBGFixed ? "fixed" : "scroll"; document.getElementById('bgFixBtn').innerText = isBGFixed ? "FIX BG: ON" : "FIX BG: OFF"; }
        function togglePlay(id) { const p = document.getElementById(`player-${id}`); const b = document.getElementById(`play-${id}`); if(!p.src || p.src.includes('undefined')) return alert("Set music first."); if(p.paused) { p.play(); b.innerText = "PAUSE"; } else { p.pause(); b.innerText = "PLAY"; } }
    </script>
</body>
</html>
